<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🤝 3‑PLAYER ESCAPE · TOUCH & PLAY</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0c1a26;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }
    .game-container {
      background: #132c3b;
      border-radius: 36px;
      padding: 16px 12px 20px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 0 2px #3e7b8f;
      max-width: 800px;
      width: 100%;
    }
    canvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: #1b3a48;
      box-shadow: inset 0 0 0 3px #2b5f72, 0 0 0 3px #1d4455;
      touch-action: none;  /* prevent scrolling while touching canvas */
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 12px 4px 8px;
      color: #f2e5c6;
    }
    .badge {
      background: #1b4457;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: bold;
      border-left: 5px solid #f5c56b;
      box-shadow: inset 0 1px 4px #0e232e, 0 4px 0 #0b1f28;
      font-size: 0.9rem;
    }
    .player-tag {
      display: inline-flex;
      align-items: center;
      background: #1f3e50;
      padding: 5px 14px;
      border-radius: 30px;
      margin: 2px 4px;
      border: 1px solid #75b2c9;
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 6px;
      margin-right: 8px;
    }
    button {
      background: #2b5b72;
      border: none;
      color: #f7efdb;
      font-weight: bold;
      padding: 12px 18px;
      margin: 4px 4px;
      border-radius: 48px;
      font-size: 1rem;
      box-shadow: 0 5px 0 #14303e, 0 3px 8px black;
      border-bottom: 2px solid #eebb55;
      transition: all 0.05s;
      cursor: pointer;
      touch-action: manipulation;
      flex: 0 0 auto;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #14303e, 0 2px 6px black;
    }
    button.gold {
      background: #d9992a;
      border-bottom-color: #ffe094;
      color: #0a1c26;
      font-weight: 900;
    }
    .touch-panel {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 16px 0 10px;
    }
    .direction-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dir-row {
      display: flex;
      gap: 12px;
      margin: 4px;
    }
    .dir-btn {
      background: #1e4458;
      width: 70px;
      height: 70px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: #fad98b;
      box-shadow: 0 6px 0 #0d262f, 0 4px 8px black;
      border-bottom: 3px solid #eebb55;
      touch-action: manipulation;
      cursor: pointer;
      user-select: none;
    }
    .dir-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #0d262f, 0 2px 6px black;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    input {
      background: #1c3d4f;
      border: 2px solid #48849b;
      padding: 12px 16px;
      border-radius: 48px;
      color: #ffefcf;
      font-weight: bold;
      font-size: 1rem;
      width: 140px;
      text-align: center;
      outline: none;
    }
    .room-section {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hint-box {
      background: #142f3f;
      padding: 12px 18px;
      border-radius: 40px;
      margin-top: 12px;
      color: #cde3f0;
      font-weight: 500;
      text-align: center;
    }
  </style>
  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="720" height="480"></canvas>
  
  <div class="status-row">
    <div class="badge" id="connectionText">🔘 OFFLINE</div>
    <div class="badge" id="levelText">🏆 LVL 1</div>
    <div id="playerList" style="display:flex; flex-wrap:wrap;"></div>
  </div>
  
  <!-- Touch controls (iPad friendly) -->
  <div class="touch-panel">
    <div class="direction-pad">
      <div class="dir-row"><div class="dir-btn" id="btnUp">⬆️</div></div>
      <div class="dir-row">
        <div class="dir-btn" id="btnLeft">⬅️</div>
        <div class="dir-btn" id="btnDown">⬇️</div>
        <div class="dir-btn" id="btnRight">➡️</div>
      </div>
    </div>
  </div>
  
  <div style="display:flex; flex-wrap:wrap; justify-content: space-between; align-items:center;">
    <div class="room-section">
      <input id="roomIdInput" placeholder="Room ID" value="COOP700" maxlength="20">
      <button id="hostBtn" class="gold">🎮 HOST</button>
      <button id="joinBtn">🔗 JOIN</button>
    </div>
    <div class="action-buttons">
      <button id="interactBtn">🖐️ INTERACT</button>
      <button id="shareBtn">🤝 SHARE</button>
      <button id="resetBtn">🔄 RESET</button>
      <button id="nextBtn">⏩ NEXT</button>
    </div>
  </div>
  
  <div class="hint-box" id="hintMessage">
    👥 Host creates room · Others join with same code · Work together!
  </div>
</div>

<script>
  (function(){
    "use strict";
    
    // ---------- CONFIG ----------
    const TILE_SIZE = 40;
    const MAP_COLS = 18;   // 720px
    const MAP_ROWS = 12;   // 480px
    const COLORS = ['#FF8BA7', '#6CC0FF', '#A3D977'];
    const NAMES = ['ACE', 'BUDDY', 'COREY'];
    
    // Global state
    let peer = null;
    let connections = {};
    let myPeerId = '';
    let isHost = false;
    let roomCode = 'COOP700';
    
    // Game state (host authoritative)
    let gameState = {
      level: 0,
      players: {},        // peerId -> { id, name, color, x, y, inventory }
      items: [],           // { type, x, y, collected }
      puzzles: [],         // interactive puzzles
      doors: [],
      exit: { x: 16, y: 10, open: false },
      win: false,
    };
    
    let localPlayer = {
      id: '', name: 'You', color: '#ccc', x: 2, y: 2, inventory: []
    };
    
    let currentLevel = null; // { walls, puzzles, items, doors, exit }
    
    // UI elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const connText = document.getElementById('connectionText');
    const levelText = document.getElementById('levelText');
    const playerListDiv = document.getElementById('playerList');
    const hintBox = document.getElementById('hintMessage');
    const roomInput = document.getElementById('roomIdInput');
    
    // ---------- LEVEL GENERATOR (FUN & COOPERATIVE) ----------
    function generateLevel(levelIndex) {
      const walls = Array(MAP_ROWS).fill().map(() => Array(MAP_COLS).fill(0));
      // border
      for(let r=0; r<MAP_ROWS; r++) for(let c=0; c<MAP_COLS; c++) 
        if(r===0||r===MAP_ROWS-1||c===0||c===MAP_COLS-1) walls[r][c]=1;
      
      // inner walls (simple maze)
      for(let r=2; r<MAP_ROWS-2; r+=2) {
        for(let c=2; c<MAP_COLS-2; c+=2) {
          if(Math.random()<0.3) walls[r][c] = 1;
        }
      }
      // clear spawn
      walls[2][2]=0; walls[2][3]=0; walls[3][2]=0;
      
      // Items: key, keycard, etc.
      const items = [];
      items.push({ type: 'key', x: 5, y: 3, collected: false });
      if(levelIndex>5) items.push({ type: 'keycard', x: 8, y: 4, collected: false });
      
      // PUZZLES (cooperative!)
      const puzzles = [];
      
      // 1. Pressure plate (needs 2 players)
      puzzles.push({
        type: 'pressure', x: 7, y: 5, solved: false,
        requiredPlayers: 2, playersOn: 0
      });
      
      // 2. Lever puzzle (two levers, need to pull simultaneously)
      puzzles.push({
        type: 'dualLever', levers: [
          { x: 10, y: 6, active: false },
          { x: 12, y: 6, active: false }
        ], solved: false
      });
      
      // 3. Code panel (hint displayed)
      const code = (100 + Math.floor(Math.random()*400)).toString();
      puzzles.push({
        type: 'code', x: 14, y: 7, solved: false,
        code: code, hint: `🔢 CODE: ${code}`
      });
      
      // Door that requires puzzles solved
      const doors = [
        { x: 15, y: 8, open: false, required: 2 }  // need 2 puzzles solved
      ];
      
      const exit = { x: 16, y: 10, open: false };
      
      return { walls, items, puzzles, doors, exit };
    }
    
    function loadLevel(levelIdx) {
      currentLevel = generateLevel(levelIdx);
      gameState.level = levelIdx;
      gameState.items = JSON.parse(JSON.stringify(currentLevel.items));
      gameState.puzzles = JSON.parse(JSON.stringify(currentLevel.puzzles));
      gameState.doors = JSON.parse(JSON.stringify(currentLevel.doors));
      gameState.exit = { ...currentLevel.exit, open: false };
      gameState.win = false;
      
      // reset player positions to spawn
      const spawns = [[2,2], [3,2], [2,3]];
      let i=0;
      for(let pid in gameState.players) {
        const sp = spawns[i%3];
        gameState.players[pid].x = sp[0];
        gameState.players[pid].y = sp[1];
        gameState.players[pid].inventory = [];
        i++;
      }
      if(localPlayer.id) {
        localPlayer.x = 2; localPlayer.y = 2;
        localPlayer.inventory = [];
      }
      
      updateUI();
      if(isHost) broadcastGameState();
    }
    
    // ---------- PEERJS ----------
    function initPeer() {
      if(peer) peer.destroy();
      peer = new Peer();
      
      peer.on('open', (id) => {
        myPeerId = id;
        connText.innerText = `🟢 ${id.substring(0,6)}`;
        if(!isHost) {
          localPlayer.id = myPeerId;
        }
      });
      
      peer.on('connection', (conn) => {
        if(!isHost) return;
        connections[conn.peer] = conn;
        setupConnection(conn);
        
        // assign player slot
        const playerCount = Object.keys(gameState.players).length;
        if(playerCount < 3) {
          const color = COLORS[playerCount];
          const name = NAMES[playerCount];
          gameState.players[conn.peer] = {
            id: conn.peer, name, color, x: 2, y: 2, inventory: []
          };
          broadcastGameState();
        }
        // send full state to new player
        setTimeout(() => {
          conn.send({ type: 'FULL_SYNC', gameState, currentLevel });
        }, 200);
      });
      
      peer.on('error', (err) => {
        connText.innerText = `🔴 ${err.type}`;
        hintBox.innerText = `❌ Connection error. Refresh and try again.`;
      });
    }
    
    function setupConnection(conn) {
      conn.on('data', (data) => handleData(conn.peer, data));
      conn.on('close', () => {
        delete connections[conn.peer];
        if(gameState.players[conn.peer]) {
          delete gameState.players[conn.peer];
          if(isHost) broadcastGameState();
        }
        updatePlayerList();
      });
    }
    
    function handleData(senderId, data) {
      if(!isHost && data.type === 'FULL_SYNC') {
        gameState = data.gameState;
        currentLevel = data.currentLevel;
        if(gameState.players[myPeerId]) {
          localPlayer = { ...gameState.players[myPeerId] };
        }
        updateUI();
        return;
      }
      
      if(isHost) {
        if(data.type === 'MOVE') {
          const player = gameState.players[senderId];
          if(player && canMoveTo(data.x, data.y, player)) {
            player.x = data.x; player.y = data.y;
            checkItemPickup(player);
            checkPuzzles();
            checkWinCondition();
            broadcastGameState();
          }
        } else if(data.type === 'INTERACT') {
          handleInteraction(senderId, data.puzzleIndex);
        } else if(data.type === 'SHARE') {
          shareItem(senderId);
        } else if(data.type === 'RESET') {
          loadLevel(gameState.level);
        } else if(data.type === 'NEXT') {
          if(gameState.win) loadLevel((gameState.level+1)%700);
        }
      } else {
        if(data.type === 'STATE_UPDATE') {
          gameState = data.gameState;
          if(gameState.players[myPeerId]) {
            localPlayer = { ...gameState.players[myPeerId] };
          }
          updateUI();
        }
      }
    }
    
    function broadcastGameState() {
      if(!isHost) return;
      const msg = { type: 'STATE_UPDATE', gameState };
      Object.values(connections).forEach(c => c.send(msg));
      updatePlayerList();
    }
    
    // ---------- GAME LOGIC ----------
    function canMoveTo(nx, ny, player) {
      if(nx<0||ny<0||nx>=MAP_COLS||ny>=MAP_ROWS) return false;
      if(currentLevel.walls[ny][nx] === 1) return false;
      for(let d of gameState.doors) {
        if(!d.open && d.x === nx && d.y === ny) return false;
      }
      return true;
    }
    
    function checkItemPickup(player) {
      for(let item of gameState.items) {
        if(!item.collected && item.x === player.x && item.y === player.y) {
          item.collected = true;
          player.inventory.push(item.type);
          hintBox.innerText = `✅ ${player.name} picked up ${item.type}!`;
        }
      }
    }
    
    function checkPuzzles() {
      // Pressure plate
      gameState.puzzles.forEach(p => {
        if(p.type === 'pressure' && !p.solved) {
          let count = 0;
          for(let pid in gameState.players) {
            const pl = gameState.players[pid];
            if(pl.x === p.x && pl.y === p.y) count++;
          }
          p.playersOn = count;
          if(count >= p.requiredPlayers) {
            p.solved = true;
            hintBox.innerText = `🎉 Pressure plate activated!`;
          }
        }
        
        // Dual lever
        if(p.type === 'dualLever' && !p.solved) {
          const bothActive = p.levers.every(l => l.active);
          if(bothActive) p.solved = true;
        }
      });
      
      // Update doors
      const solvedCount = gameState.puzzles.filter(p => p.solved).length;
      gameState.doors.forEach(d => { d.open = solvedCount >= d.required; });
    }
    
    function checkWinCondition() {
      const allSolved = gameState.puzzles.every(p => p.solved);
      gameState.exit.open = allSolved;
      
      for(let pid in gameState.players) {
        const p = gameState.players[pid];
        if(gameState.exit.open && p.x === gameState.exit.x && p.y === gameState.exit.y) {
          gameState.win = true;
          hintBox.innerText = `🏆 ESCAPED! Great teamwork!`;
        }
      }
    }
    
    function handleInteraction(playerId, puzzleIdx) {
      const player = gameState.players[playerId];
      const puzzle = gameState.puzzles[puzzleIdx];
      if(!puzzle || puzzle.solved) return;
      
      // distance check
      if(Math.abs(player.x - puzzle.x) > 1 || Math.abs(player.y - puzzle.y) > 1) {
        // for dual lever check each lever
        if(puzzle.type === 'dualLever') {
          for(let lever of puzzle.levers) {
            if(player.x === lever.x && player.y === lever.y) {
              lever.active = true;
              hintBox.innerText = `🔧 Lever pulled! Need both.`;
              break;
            }
          }
        }
        checkPuzzles();
        broadcastGameState();
        return;
      }
      
      if(puzzle.type === 'code') {
        // For simplicity, auto-solve if player has key
        if(player.inventory.includes('key')) {
          puzzle.solved = true;
          hintBox.innerText = `🔓 Code panel unlocked with key!`;
        } else {
          hintBox.innerText = `🔐 Need a key to activate. Code: ${puzzle.code}`;
        }
      } else if(puzzle.type === 'pressure') {
        // handled automatically by movement
      }
      
      checkPuzzles();
      checkWinCondition();
      broadcastGameState();
    }
    
    function shareItem(giverId) {
      const giver = gameState.players[giverId];
      if(!giver || giver.inventory.length === 0) {
        hintBox.innerText = `❌ No items to share.`;
        return;
      }
      // give to nearest player
      for(let pid in gameState.players) {
        if(pid === giverId) continue;
        const other = gameState.players[pid];
        if(Math.abs(other.x - giver.x) <= 1 && Math.abs(other.y - giver.y) <= 1) {
          const item = giver.inventory.pop();
          other.inventory.push(item);
          hintBox.innerText = `🤲 ${giver.name} gave ${item} to ${other.name}`;
          broadcastGameState();
          return;
        }
      }
      hintBox.innerText = `👥 Stand next to a teammate to share.`;
    }
    
    // ---------- LOCAL MOVEMENT ----------
    function tryMove(dx, dy) {
      if(!myPeerId || gameState.win) return;
      const nx = localPlayer.x + dx;
      const ny = localPlayer.y + dy;
      if(!canMoveTo(nx, ny, localPlayer)) return;
      
      localPlayer.x = nx; localPlayer.y = ny;
      
      if(isHost) {
        const hostPlayer = gameState.players[myPeerId];
        if(hostPlayer) {
          hostPlayer.x = nx; hostPlayer.y = ny;
          checkItemPickup(hostPlayer);
          checkPuzzles();
          checkWinCondition();
          broadcastGameState();
        }
      } else {
        Object.values(connections).forEach(c => c.send({ type: 'MOVE', x: nx, y: ny }));
      }
    }
    
    function localInteract() {
      if(!myPeerId) return;
      // find nearby puzzle
      let puzzleIdx = -1;
      gameState.puzzles.forEach((p, idx) => {
        if(p.type === 'dualLever') {
          p.levers.forEach(l => { if(l.x===localPlayer.x && l.y===localPlayer.y) puzzleIdx = idx; });
        } else {
          if(p.x === localPlayer.x && p.y === localPlayer.y) puzzleIdx = idx;
        }
      });
      
      if(puzzleIdx !== -1) {
        if(isHost) {
          handleInteraction(myPeerId, puzzleIdx);
        } else {
          Object.values(connections).forEach(c => c.send({ type: 'INTERACT', puzzleIndex: puzzleIdx }));
        }
      } else {
        hintBox.innerText = `👀 Stand on a puzzle to interact.`;
      }
    }
    
    // ---------- RENDERING ----------
    function draw() {
      ctx.clearRect(0,0,720,480);
      if(!currentLevel) return;
      
      // tiles
      for(let r=0; r<MAP_ROWS; r++) {
        for(let c=0; c<MAP_COLS; c++) {
          let x=c*TILE_SIZE, y=r*TILE_SIZE;
          if(currentLevel.walls[r][c] === 1) {
            ctx.fillStyle = '#3a2e24';
            ctx.fillRect(x,y,TILE_SIZE,TILE_SIZE);
            ctx.fillStyle = '#5d4e3c';
            ctx.fillRect(x+2,y+2,TILE_SIZE-4,TILE_SIZE-4);
          } else {
            ctx.fillStyle = '#1d3d4f';
            ctx.fillRect(x,y,TILE_SIZE,TILE_SIZE);
            ctx.fillStyle = '#2e5a6e';
            ctx.fillRect(x+1,y+1,TILE_SIZE-2,TILE_SIZE-2);
          }
        }
      }
      
      // puzzles
      gameState.puzzles.forEach(p => {
        if(p.type === 'pressure') {
          let x=p.x*TILE_SIZE, y=p.y*TILE_SIZE;
          ctx.fillStyle = p.solved ? '#a5e0a5' : '#7a9eb5';
          ctx.beginPath(); ctx.arc(x+20, y+20, 14, 0, 2*Math.PI); ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font='bold 16px sans'; ctx.fillText(`${p.playersOn||0}/2`, x+12, y+28);
        } else if(p.type === 'dualLever') {
          p.levers.forEach(l => {
            let x=l.x*TILE_SIZE, y=l.y*TILE_SIZE;
            ctx.fillStyle = l.active ? '#b3ff9b' : '#b58a6f';
            ctx.fillRect(x+8, y+8, 24, 24);
            ctx.fillStyle='#000'; ctx.fillText('🔧', x+12, y+28);
          });
        } else if(p.type === 'code') {
          let x=p.x*TILE_SIZE, y=p.y*TILE_SIZE;
          ctx.fillStyle = p.solved ? '#a0e0a0' : '#7a9bb5';
          ctx.fillRect(x+5, y+5, 30, 30);
          ctx.fillStyle='#000'; ctx.font='bold 16px sans'; ctx.fillText('🔢', x+10, y+28);
        }
      });
      
      // items
      gameState.items.filter(i=>!i.collected).forEach(it => {
        let x=it.x*TILE_SIZE, y=it.y*TILE_SIZE;
        ctx.fillStyle = it.type==='key'?'#FFD966':'#b0c4de';
        ctx.beginPath(); ctx.arc(x+20, y+20, 10, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle='#000'; ctx.fillText(it.type[0], x+16, y+26);
      });
      
      // doors
      gameState.doors.filter(d=>!d.open).forEach(d => {
        let x=d.x*TILE_SIZE, y=d.y*TILE_SIZE;
        ctx.fillStyle = '#6b4f32'; ctx.fillRect(x+4,y+4,32,32);
        ctx.fillStyle = '#9b7e5a'; ctx.fillRect(x+8,y+8,24,24);
      });
      
      // exit
      const ex = gameState.exit;
      ctx.fillStyle = ex.open ? '#b3ffaa' : '#5f735f';
      ctx.fillRect(ex.x*TILE_SIZE+8, ex.y*TILE_SIZE+8, 24,24);
      ctx.fillStyle='#fff'; ctx.font='bold 20px sans'; ctx.fillText('🚪', ex.x*TILE_SIZE+12, ex.y*TILE_SIZE+30);
      
      // players
      for(let pid in gameState.players) {
        const p = gameState.players[pid];
        ctx.fillStyle = p.color;
        ctx.shadowColor = '#fff6'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(p.x*TILE_SIZE+20, p.y*TILE_SIZE+20, 15, 0, 2*Math.PI); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle='white'; ctx.font='bold 12px sans'; ctx.fillText(p.name, p.x*TILE_SIZE+10, p.y*TILE_SIZE+8);
        if(p.inventory.length) {
          ctx.fillStyle='#FFD966'; ctx.beginPath(); ctx.arc(p.x*TILE_SIZE+30, p.y*TILE_SIZE+8, 7, 0, 2*Math.PI); ctx.fill();
        }
      }
      
      if(gameState.win) {
        ctx.fillStyle='#fad98b'; ctx.font='bold 32px sans'; ctx.fillText('✨ ESCAPED! ✨', 160, 200);
      }
      
      levelText.innerText = `🏆 LVL ${gameState.level+1}`;
      updatePlayerList();
      requestAnimationFrame(draw);
    }
    
    function updatePlayerList() {
      let html = '';
      for(let pid in gameState.players) {
        const p = gameState.players[pid];
        html += `<div class="player-tag"><span class="color-dot" style="background:${p.color}"></span>${p.name} ${p.inventory.length?'📦':''}</div>`;
      }
      playerListDiv.innerHTML = html || '<span style="color:#aaa">Waiting for players...</span>';
    }
    
    function updateUI() {
      updatePlayerList();
      levelText.innerText = `🏆 LVL ${gameState.level+1}`;
    }
    
    // ---------- SETUP EVENT LISTENERS (iPad friendly) ----------
    function initEvents() {
      document.getElementById('btnUp').addEventListener('click', () => tryMove(0, -1));
      document.getElementById('btnDown').addEventListener('click', () => tryMove(0, 1));
      document.getElementById('btnLeft').addEventListener('click', () => tryMove(-1, 0));
      document.getElementById('btnRight').addEventListener('click', () => tryMove(1, 0));
      
      // Keyboard fallback
      window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp'||e.key==='w') { tryMove(0,-1); e.preventDefault(); }
        if(e.key === 'ArrowDown'||e.key==='s') { tryMove(0,1); e.preventDefault(); }
        if(e.key === 'ArrowLeft'||e.key==='a') { tryMove(-1,0); e.preventDefault(); }
        if(e.key === 'ArrowRight'||e.key==='d') { tryMove(1,0); e.preventDefault(); }
        if(e.key === 'e'||e.key==='E') { localInteract(); e.preventDefault(); }
      });
      
      document.getElementById('hostBtn').addEventListener('click', () => {
        roomCode = roomInput.value.trim() || 'COOP700';
        initPeer();
        isHost = true;
        connText.innerText = `👑 HOST · ${roomCode}`;
        localPlayer = { id: myPeerId, name: 'HOST', color: COLORS[0], x:2, y:2, inventory:[] };
        gameState.players = { [myPeerId]: localPlayer };
        loadLevel(0);
        hintBox.innerText = `🎮 You are host! Share code: ${roomCode}`;
      });
      
      document.getElementById('joinBtn').addEventListener('click', () => {
        roomCode = roomInput.value.trim();
        if(!roomCode) return;
        initPeer();
        isHost = false;
        peer.on('open', () => {
          const conn = peer.connect(roomCode, { reliable: true });
          connections[roomCode] = conn;
          setupConnection(conn);
          connText.innerText = `🔵 JOINED ${roomCode}`;
          hintBox.innerText = `👋 Connected! Wait for host to start.`;
        });
      });
      
      document.getElementById('interactBtn').addEventListener('click', localInteract);
      document.getElementById('shareBtn').addEventListener('click', () => {
        if(isHost) shareItem(myPeerId);
        else Object.values(connections).forEach(c => c.send({ type: 'SHARE' }));
      });
      document.getElementById('resetBtn').addEventListener('click', () => {
        if(isHost) loadLevel(gameState.level);
        else Object.values(connections).forEach(c => c.send({ type: 'RESET' }));
      });
      document.getElementById('nextBtn').addEventListener('click', () => {
        if(!gameState.win) { hintBox.innerText = '🚫 Solve all puzzles first!'; return; }
        if(isHost) loadLevel((gameState.level+1)%700);
        else Object.values(connections).forEach(c => c.send({ type: 'NEXT' }));
      });
    }
    
    // Initialize
    initPeer();
    currentLevel = generateLevel(0);
    gameState.players = {};
    initEvents();
    requestAnimationFrame(draw);
    hintBox.innerText = '👥 Host a room, then share the code with friends!';
  })();
</script>
</body>
</html>
