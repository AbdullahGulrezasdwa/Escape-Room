<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escape Room – 3 Player</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    #lobby, #gameUI {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20,20,20,0.9);
        padding: 25px;
        border-radius: 12px;
        width: 350px;
        text-align: center;
        display: none;
    }

    #lobby { display: block; }

    input, button {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: none;
        font-size: 16px;
    }

    button {
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    #playerList {
        margin-top: 10px;
        font-size: 14px;
        color: #ccc;
    }

    #canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

    #roomInfo {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.6);
        padding: 12px;
        border-radius: 8px;
        display: none;
    }
</style>
</head>

<body>

<canvas id="canvas" width="900" height="600"></canvas>

<!-- LOBBY -->
<div id="lobby">
    <h2>Escape Room Multiplayer</h2>

    <input id="nameInput" placeholder="Your Name">
    <input id="colorInput" placeholder="Color (e.g. red)">

    <button id="createBtn">Create Room</button>

    <input id="joinInput" placeholder="Room ID">
    <button id="joinBtn">Join Room</button>

    <p id="roomIdDisplay"></p>
    <div id="playerList"></div>

    <button id="startBtn" style="display:none;">Start Game</button>
</div>

<!-- GAME UI -->
<div id="roomInfo">
    <h3 id="roomTitle"></h3>
    <p id="roomDesc"></p>
</div>

<script>
/* -------------------------
   BASIC SETUP
--------------------------*/
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let peer = new Peer();
let host = false;
let roomId = null;
let connections = [];
let localId = null;

let gameState = {
    room: 0,
    players: {}
};

const rooms = [
    {title:"Room 1", desc:"Warm-up puzzle", code:"1234"},
    {title:"Room 2", desc:"Harder puzzle", code:"4321"},
    {title:"Room 3", desc:"Teamwork required", code:"9999"}
];

/* -------------------------
   PEERJS
--------------------------*/
peer.on("open", id => {
    localId = id;
});

/* -------------------------
   HOST CREATES ROOM
--------------------------*/
document.getElementById("createBtn").onclick = () => {
    host = true;
    roomId = localId;
    document.getElementById("roomIdDisplay").textContent = "Room ID: " + roomId;
};

/* -------------------------
   JOIN ROOM
--------------------------*/
document.getElementById("joinBtn").onclick = () => {
    const target = document.getElementById("joinInput").value.trim();
    if (!target) return;

    const conn = peer.connect(target);
    setupClient(conn);
};

/* -------------------------
   HOST ACCEPTS CONNECTIONS
--------------------------*/
peer.on("connection", conn => {
    if (!host) return;
    setupHost(conn);
});

/* -------------------------
   HOST LOGIC
--------------------------*/
function setupHost(conn) {
    connections.push(conn);

    conn.on("data", msg => {
        if (msg.type === "MOVE") {
            gameState.players[msg.id].x = msg.x;
            gameState.players[msg.id].y = msg.y;
        }
    });

    // Add player
    gameState.players[conn.peer] = {
        name: "Player",
        color: "white",
        x: 100,
        y: 100
    };

    updatePlayerList();

    if (connections.length === 2) {
        document.getElementById("startBtn").style.display = "block";
    }
}

/* -------------------------
   CLIENT LOGIC
--------------------------*/
function setupClient(conn) {
    conn.on("open", () => {
        // Send player info
        conn.send({
            type: "JOIN",
            name: document.getElementById("nameInput").value,
            color: document.getElementById("colorInput").value,
            id: localId
        });
    });

    conn.on("data", msg => {
        if (msg.type === "STATE") {
            gameState = msg.state;
            render();
            updateRoomInfo();
        }
    });
}

/* -------------------------
   START GAME (HOST)
--------------------------*/
document.getElementById("startBtn").onclick = () => {
    document.getElementById("lobby").style.display = "none";
    document.getElementById("roomInfo").style.display = "block";

    setInterval(() => {
        broadcast({type:"STATE", state:gameState});
    }, 100);
};

/* -------------------------
   BROADCAST
--------------------------*/
function broadcast(msg) {
    connections.forEach(c => c.send(msg));
}

/* -------------------------
   UI HELPERS
--------------------------*/
function updatePlayerList() {
    const list = document.getElementById("playerList");
    list.innerHTML = "Players:<br>";
    for (let id in gameState.players) {
        list.innerHTML += "- " + id + "<br>";
    }
}

function updateRoomInfo() {
    const r = rooms[gameState.room];
    document.getElementById("roomTitle").textContent = r.title;
    document.getElementById("roomDesc").textContent = r.desc;
}

/* -------------------------
   MOVEMENT
--------------------------*/
window.addEventListener("keydown", e => {
    const p = gameState.players[localId];
    if (!p) return;

    if (e.key === "ArrowUp") p.y -= 10;
    if (e.key === "ArrowDown") p.y += 10;
    if (e.key === "ArrowLeft") p.x -= 10;
    if (e.key === "ArrowRight") p.x += 10;

    render();
});

/* -------------------------
   RENDER
--------------------------*/
function render() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for (let id in gameState.players) {
        const p = gameState.players[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 30, 30);
        ctx.fillStyle = "white";
        ctx.fillText(p.name, p.x, p.y - 5);
    }
}
</script>

</body>
</html>
