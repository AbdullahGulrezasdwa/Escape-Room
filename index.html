<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 ESCAPE TOGETHER · 3‑PLAYER PUZZLE ROOMS</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a2a3a, #0b1018);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
    }
    .game-wrapper {
      background: #0f1a1f;
      border-radius: 2.5rem;
      padding: 1.5rem 2rem;
      box-shadow: 0 25px 35px rgba(0,0,0,0.7), inset 0 0 0 2px #3e5f6b;
      border-bottom: 6px solid #b87c4d;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 24px;
      box-shadow: 0 0 0 4px #1e2f3a, inset 0 0 0 3px #c9a87c;
      background: #17242b;
      image-rendering: crisp-edges;
      cursor: pointer;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin: 16px 8px 12px 8px;
      color: #f2e1c0;
      text-shadow: 2px 2px 0 #0a1015;
    }
    .badge {
      background: #1b313e;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: bold;
      border-left: 6px solid #e4b574;
      box-shadow: inset 0 2px 5px #0c151c, 0 6px 0 #0b151c;
      letter-spacing: 1px;
    }
    button {
      background: #2f4a5c;
      border: none;
      color: #f5e7d3;
      font-weight: bold;
      padding: 8px 18px;
      margin: 0 4px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #121e26, 0 3px 8px black;
      border-bottom: 2px solid #e4b574;
      transition: 0.05s linear;
      text-transform: uppercase;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #121e26, 0 2px 6px black;
    }
    button.gold {
      background: #b87c4d;
      border-bottom-color: #ffd89c;
      color: #0d1a1f;
      font-weight: 900;
    }
    input {
      background: #192f3c;
      border: 2px solid #3f6b7c;
      padding: 8px 14px;
      border-radius: 36px;
      color: #ffefd1;
      font-weight: bold;
      width: 150px;
      text-align: center;
      outline: none;
    }
    .inventory-panel {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #0e1e26b3;
      padding: 4px 20px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }
    .inv-slot {
      background: #1b3847;
      padding: 5px 15px;
      border-radius: 30px;
      color: #fad98b;
      font-weight: bold;
      border: 1px solid #aac7d4;
    }
    .puzzle-hint {
      background: #1f3f4e;
      margin-top: 12px;
      padding: 8px 18px;
      border-radius: 36px;
      color: #cde5f0;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  
  <div class="top-bar">
    <div class="badge" id="connStatus">⚫ OFFLINE</div>
    <div class="badge" id="levelDisplay">🏁 LVL 1</div>
    <div class="inventory-panel">
      <span>🎒 INVENTORY</span>
      <span class="inv-slot" id="invDisplay">🔑 Key</span>
    </div>
  </div>
  
  <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between;">
    <div>
      <input id="roomInput" placeholder="Room code" value="FUN700" maxlength="20">
      <button id="hostBtn" class="gold">🎮 HOST</button>
      <button id="joinBtn">🔗 JOIN</button>
    </div>
    <div>
      <button id="interactBtn" style="background:#3d6e5a;">🖐️ INTERACT / USE</button>
      <button id="shareItemBtn" style="background:#6e5a3d;">🤲 SHARE ITEM</button>
      <button id="resetBtn">⟲ RESET</button>
      <button id="nextBtn">⏩ NEXT</button>
    </div>
  </div>
  
  <div class="puzzle-hint" id="hintMessage">
    ⭐ Move with WASD/arrows · Stand on panels · Press E or INTERACT near objects
  </div>
</div>

<script>
  (() => {
    // ---------- CONFIG ----------
    const TILE = 40;
    const COLS = 20, ROWS = 12;  // 800x500
    const PLAYER_COLORS = ['#FF8CA2', '#6EC8FF', '#A0E57E'];
    const NAMES = ['ACE', 'BUDDY', 'COOP'];
    
    // global
    let peer, conns = {}, myId = '', isHost = false, room = 'FUN700';
    let game = {
      level: 0,
      players: {},
      items: [],        // {type, x, y, collected, owner?}
      puzzles: [],      // interactive puzzles
      doors: [],
      exit: {x:18,y:10,open:false},
      win: false,
    };
    let local = { id:'', name:'You', color:'#ccc', x:2,y:2, inventory:[] };
    let currentLevelData = null; // walls, etc
    
    // UI elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const connStatus = document.getElementById('connStatus');
    const lvlDisplay = document.getElementById('levelDisplay');
    const invDisplay = document.getElementById('invDisplay');
    const hintEl = document.getElementById('hintMessage');
    const roomInput = document.getElementById('roomInput');
    
    // ---------- PUZZLE TYPES ----------
    const PUZZLE_TYPES = {
      CODE_PANEL: 'code',      // enter 3-digit code (displayed as hint somewhere)
      LEVER_SET: 'lever',      // pull levers in correct order
      KEYCARD_READER: 'keycard',
      WEIGHT_PLATE: 'weight',  // need 2 players + item
    };
    
    // ---------- LEVEL GENERATOR (FUN PUZZLES!) ----------
    function buildLevel(idx) {
      const walls = Array(ROWS).fill().map(() => Array(COLS).fill(0));
      // border
      for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) 
        if(r===0||r===ROWS-1||c===0||c===COLS-1) walls[r][c]=1;
      
      const diff = Math.min(0.9, idx/700);
      // procedural walls (maze-like)
      for(let r=2; r<ROWS-2; r+=2) {
        for(let c=2; c<COLS-2; c+=2) {
          if(Math.random()<0.25+diff*0.3) {
            walls[r][c] = 1;
            if(Math.random()<0.4 && c+1<COLS-1) walls[r][c+1]=1;
          }
        }
      }
      // clear spawn
      walls[2][2]=0; walls[2][3]=0; walls[3][2]=0;
      
      // Items: key, keycard, crowbar
      const items = [];
      if(Math.random()>0.2) items.push({type:'key', x:4, y:3, collected:false});
      if(idx>20) items.push({type:'keycard', x:6, y:5, collected:false});
      
      // Puzzles
      const puzzles = [];
      // Code panel with hint
      const code = `${Math.floor(Math.random()*400)+100}`;
      puzzles.push({
        type: 'code', x: 8, y: 4, solved: false, 
        code: code, input: '', hint: `🔢 CODE: ${code}`,
      });
      
      // Lever puzzle (sequence)
      puzzles.push({
        type: 'lever', x: 12, y: 5, solved: false,
        levers: [false, false, false], correct: [1,0,2], pulled: [],
      });
      
      // Keycard reader
      puzzles.push({
        type: 'keycard', x: 15, y: 7, solved: false,
      });
      
      // Weight plate (coop)
      puzzles.push({
        type: 'weight', x: 5, y: 8, solved: false, requiredPlayers: 2,
      });
      
      // Door that requires puzzles
      const doors = [{ x: 16, y: 9, open: false, req: 'puzzles', needed: 2 }];
      
      return { walls, items, puzzles, doors, exit: {x:18, y:10, open:false} };
    }
    
    function loadLevel(idx) {
      currentLevelData = buildLevel(idx);
      game.level = idx;
      game.items = JSON.parse(JSON.stringify(currentLevelData.items));
      game.puzzles = JSON.parse(JSON.stringify(currentLevelData.puzzles));
      game.doors = JSON.parse(JSON.stringify(currentLevelData.doors));
      game.exit = {x:18, y:10, open:false};
      game.win = false;
      
      // reset players
      let spawns = [[2,2],[3,2],[2,3]];
      let i=0;
      for(let pid in game.players) {
        let sp = spawns[i%3];
        game.players[pid].x = sp[0]; game.players[pid].y = sp[1];
        game.players[pid].inventory = [];
        i++;
      }
      if(local.id) { local.x=2; local.y=2; local.inventory=[]; }
      updateUI();
      if(isHost) broadcastState();
    }
    
    // ---------- PEERJS ----------
    function initPeer() {
      peer = new Peer();
      peer.on('open', id => {
        myId = id;
        connStatus.innerText = `🟢 ${id.slice(0,6)}`;
      });
      peer.on('connection', conn => {
        if(!isHost) return;
        conns[conn.peer] = conn;
        conn.on('data', data => handleData(conn.peer, data));
        conn.on('close', () => { delete conns[conn.peer]; delete game.players[conn.peer]; });
        // add player slot
        const slots = Object.keys(game.players).length;
        if(slots<3) {
          game.players[conn.peer] = {
            id: conn.peer, name: NAMES[slots], color: PLAYER_COLORS[slots],
            x:2, y:2, inventory:[]
          };
          broadcastState();
        }
      });
      peer.on('error', e => connStatus.innerText = '🔴 ERROR');
    }
    
    function handleData(sender, data) {
      if(!isHost && data.type === 'FULL') {
        game = data.game;
        currentLevelData = data.levelData;
        if(game.players[myId]) local = {...game.players[myId]};
        updateUI();
      }
      if(isHost) {
        if(data.type === 'MOVE') {
          const p = game.players[sender];
          if(p && canMove(data.x, data.y, p)) {
            p.x = data.x; p.y = data.y;
            checkPickup(p);
            checkPuzzles();
            broadcastState();
          }
        } else if(data.type === 'INTERACT') {
          handleInteraction(sender, data.puzzleIdx);
        } else if(data.type === 'SHARE') {
          shareItem(sender);
        } else if(data.type === 'RESET') {
          loadLevel(game.level);
        } else if(data.type === 'NEXT' && game.win) {
          loadLevel((game.level+1)%700);
        }
      } else {
        if(data.type === 'STATE') {
          game = data.game;
          if(game.players[myId]) local = {...game.players[myId]};
          updateUI();
        }
      }
    }
    
    function broadcastState() {
      if(!isHost) return;
      const msg = { type: 'STATE', game };
      Object.values(conns).forEach(c => c.send(msg));
    }
    
    // ---------- GAME MECHANICS ----------
    function canMove(nx, ny, player) {
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) return false;
      if(currentLevelData.walls[ny][nx]===1) return false;
      for(let d of game.doors) if(!d.open && d.x===nx && d.y===ny) return false;
      return true;
    }
    
    function checkPickup(player) {
      for(let item of game.items) {
        if(!item.collected && item.x===player.x && item.y===player.y) {
          item.collected = true;
          if(!player.inventory) player.inventory = [];
          player.inventory.push(item.type);
        }
      }
      checkWin();
    }
    
    function checkPuzzles() {
      // weight plates
      game.puzzles.forEach(p => {
        if(p.type==='weight' && !p.solved) {
          let cnt = 0;
          for(let pid in game.players) {
            const pl = game.players[pid];
            if(pl.x===p.x && pl.y===p.y) cnt++;
          }
          if(cnt >= p.requiredPlayers) p.solved = true;
        }
      });
      
      // update doors
      const solvedCount = game.puzzles.filter(p=>p.solved).length;
      game.doors.forEach(d => { d.open = solvedCount >= d.needed; });
      checkWin();
    }
    
    function checkWin() {
      const allSolved = game.puzzles.every(p=>p.solved);
      const exit = game.exit;
      exit.open = allSolved;
      for(let pid in game.players) {
        const p = game.players[pid];
        if(exit.open && p.x===exit.x && p.y===exit.y) game.win = true;
      }
    }
    
    function handleInteraction(pid, puzzleIdx) {
      const player = game.players[pid];
      const puzzle = game.puzzles[puzzleIdx];
      if(!puzzle || puzzle.solved) return;
      
      // distance check
      if(Math.abs(player.x-puzzle.x)>1 || Math.abs(player.y-puzzle.y)>1) return;
      
      if(puzzle.type === 'code') {
        // simulate entering code (in real game we'd have UI, here auto-solve if player has hint)
        // For fun: if player inventory has 'key', they can solve
        if(player.inventory.includes('key')) {
          puzzle.solved = true;
          hintEl.innerText = `✅ Code panel solved!`;
        } else {
          hintEl.innerText = `🔐 Need key to activate panel.`;
        }
      } else if(puzzle.type === 'lever') {
        // toggle lever order
        puzzle.pulled.push(puzzle.levers.length);
        if(puzzle.pulled.length===3) {
          if(JSON.stringify(puzzle.pulled) === JSON.stringify(puzzle.correct)) puzzle.solved = true;
          else puzzle.pulled = [];
        }
        hintEl.innerText = `🎚️ Lever ${puzzle.pulled.length}/3`;
      } else if(puzzle.type === 'keycard') {
        if(player.inventory.includes('keycard')) {
          puzzle.solved = true;
          player.inventory = player.inventory.filter(i=>i!=='keycard');
        }
      }
      
      checkPuzzles();
      broadcastState();
    }
    
    function shareItem(senderId) {
      const giver = game.players[senderId];
      if(!giver || giver.inventory.length===0) return;
      // give to nearest player
      for(let pid in game.players) {
        if(pid===senderId) continue;
        const other = game.players[pid];
        if(Math.abs(other.x-giver.x)<=1 && Math.abs(other.y-giver.y)<=1) {
          const item = giver.inventory.pop();
          other.inventory.push(item);
          break;
        }
      }
      broadcastState();
    }
    
    // ---------- LOCAL INPUT ----------
    function tryMove(dx, dy) {
      if(!myId || game.win) return;
      const nx = local.x+dx, ny = local.y+dy;
      if(!canMove(nx, ny, local)) return;
      local.x = nx; local.y = ny;
      
      if(isHost) {
        const hostP = game.players[myId];
        hostP.x = nx; hostP.y = ny;
        checkPickup(hostP);
        checkPuzzles();
        broadcastState();
      } else {
        Object.values(conns).forEach(c => c.send({type:'MOVE', x:nx, y:ny}));
      }
    }
    
    function interact() {
      if(!myId) return;
      // find nearby puzzle
      const puzzleIdx = game.puzzles.findIndex(p => 
        Math.abs(p.x-local.x)<=1 && Math.abs(p.y-local.y)<=1 && !p.solved
      );
      if(puzzleIdx!==-1) {
        if(isHost) handleInteraction(myId, puzzleIdx);
        else Object.values(conns).forEach(c => c.send({type:'INTERACT', puzzleIdx}));
      }
    }
    
    // ---------- RENDERING (juicy!) ----------
    function draw() {
      ctx.clearRect(0,0,800,500);
      // tiles
      for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
          let x=c*TILE, y=r*TILE;
          if(currentLevelData.walls[r][c]===1) {
            ctx.fillStyle='#3a2c1c';
            ctx.fillRect(x,y,TILE,TILE);
            ctx.fillStyle='#5d4a32';
            ctx.fillRect(x+2,y+2,TILE-4,TILE-4);
          } else {
            ctx.fillStyle='#1e3340';
            ctx.fillRect(x,y,TILE,TILE);
            ctx.fillStyle='#2f4a5c';
            ctx.fillRect(x+1,y+1,TILE-2,TILE-2);
          }
        }
      }
      
      // puzzles
      game.puzzles.forEach((p,i) => {
        let x=p.x*TILE, y=p.y*TILE;
        if(p.type==='code') {
          ctx.fillStyle = p.solved ? '#6f9' : '#7a9bb5';
          ctx.fillRect(x+5,y+5,30,30);
          ctx.fillStyle='black'; ctx.font='bold 14px monospace'; ctx.fillText('🔢',x+10,y+26);
        } else if(p.type==='lever') {
          ctx.fillStyle = p.solved ? '#adff8c' : '#b58a6f';
          ctx.beginPath(); ctx.arc(x+20,y+20,14,0,2*Math.PI); ctx.fill();
          ctx.fillStyle='white'; ctx.fillText('🎚️',x+12,y+27);
        } else if(p.type==='keycard') {
          ctx.fillStyle = p.solved ? '#a0e0a0' : '#a57c6c';
          ctx.fillRect(x+8,y+8,24,24);
          ctx.fillStyle='black'; ctx.fillText('🪪',x+14,y+28);
        } else if(p.type==='weight') {
          ctx.fillStyle = p.solved ? '#c0e080' : '#8f9e8f';
          ctx.beginPath(); ctx.arc(x+20,y+20,12,0,2*Math.PI); ctx.fill();
          ctx.fillText('⚖️',x+12,y+28);
        }
      });
      
      // items
      game.items.filter(i=>!i.collected).forEach(it => {
        let x=it.x*TILE, y=it.y*TILE;
        ctx.fillStyle = it.type==='key'?'#FFD966':(it.type==='keycard'?'#b0c4de':'#c19a6b');
        ctx.beginPath(); ctx.arc(x+20,y+20,10,0,2*Math.PI); ctx.fill();
        ctx.fillStyle='black'; ctx.fillText(it.type[0].toUpperCase(),x+16,y+26);
      });
      
      // doors
      game.doors.filter(d=>!d.open).forEach(d => {
        let x=d.x*TILE, y=d.y*TILE;
        ctx.fillStyle='#6b4f32'; ctx.fillRect(x+4,y+4,32,32);
        ctx.fillStyle='#9b7e5a'; ctx.fillRect(x+8,y+8,24,24);
        ctx.fillStyle='white'; ctx.fillText('🚪',x+12,y+30);
      });
      
      // exit
      const ex = game.exit;
      ctx.fillStyle = ex.open ? '#b3ffaa' : '#5f735f';
      ctx.fillRect(ex.x*TILE+8, ex.y*TILE+8, 24,24);
      ctx.fillStyle='white'; ctx.font='bold 20px sans'; ctx.fillText('🏁',ex.x*TILE+12,ex.y*TILE+30);
      
      // players
      for(let pid in game.players) {
        const p = game.players[pid];
        ctx.fillStyle = p.color;
        ctx.shadowColor = '#fff6'; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(p.x*TILE+20, p.y*TILE+20, 16, 0, 2*Math.PI); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
        ctx.fillStyle='white'; ctx.font='bold 12px monospace'; 
        ctx.fillText(p.name, p.x*TILE+10, p.y*TILE+10);
        if(p.inventory?.length) {
          ctx.fillStyle='#FFD966'; ctx.beginPath(); ctx.arc(p.x*TILE+30,p.y*TILE+8,7,0,2*Math.PI); ctx.fill();
        }
      }
      
      // inventory UI
      invDisplay.innerText = local.inventory?.length ? local.inventory.join(' · ') : 'Empty';
      lvlDisplay.innerText = `🏁 LVL ${game.level+1}`;
      
      if(game.win) {
        ctx.fillStyle='#fad98b'; ctx.font='bold 32px monospace'; 
        ctx.fillText('✨ ESCAPED! ✨', 200, 200);
      }
      requestAnimationFrame(draw);
    }
    
    function updateUI() { /* already in draw */ }
    
    // ---------- EVENT LISTENERS ----------
    window.addEventListener('keydown', e => {
      if(e.key === 'ArrowUp'||e.key==='w') { tryMove(0,-1); e.preventDefault(); }
      if(e.key === 'ArrowDown'||e.key==='s') { tryMove(0,1); e.preventDefault(); }
      if(e.key === 'ArrowLeft'||e.key==='a') { tryMove(-1,0); e.preventDefault(); }
      if(e.key === 'ArrowRight'||e.key==='d') { tryMove(1,0); e.preventDefault(); }
      if(e.key === 'e' || e.key === 'E') { interact(); e.preventDefault(); }
    });
    
    document.getElementById('hostBtn').onclick = () => {
      room = roomInput.value.trim()||'FUN700';
      if(peer) peer.destroy();
      initPeer();
      isHost = true;
      connStatus.innerText = `👑 HOST · ${room}`;
      local.id = myId; local.color = PLAYER_COLORS[0]; local.name = 'HOST';
      game.players = { [myId]: { id:myId, name:'HOST', color:PLAYER_COLORS[0], x:2,y:2,inventory:[] } };
      loadLevel(0);
    };
    
    document.getElementById('joinBtn').onclick = () => {
      room = roomInput.value.trim();
      if(!room) return;
      if(peer) peer.destroy();
      initPeer();
      isHost = false;
      peer.on('open', () => {
        const conn = peer.connect(room, {reliable:true});
        conns[room] = conn;
        conn.on('data', d => handleData(room, d));
        conn.on('open', () => connStatus.innerText = `🔵 JOINED ${room}`);
      });
    };
    
    document.getElementById('interactBtn').onclick = interact;
    document.getElementById('shareItemBtn').onclick = () => {
      if(isHost) shareItem(myId);
      else Object.values(conns).forEach(c => c.send({type:'SHARE'}));
    };
    document.getElementById('resetBtn').onclick = () => {
      if(isHost) loadLevel(game.level);
      else Object.values(conns).forEach(c => c.send({type:'RESET'}));
    };
    document.getElementById('nextBtn').onclick = () => {
      if(!game.win) { hintEl.innerText='🚫 Solve all puzzles first!'; return; }
      if(isHost) loadLevel((game.level+1)%700);
      else Object.values(conns).forEach(c => c.send({type:'NEXT'}));
    };
    
    // start
    initPeer();
    currentLevelData = buildLevel(0);
    game.players = {};
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
