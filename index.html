<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>👥 ESCAPE TOGETHER · 3 PLAYER · 4‑DIGIT ROOM</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1c26;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }
    .game-container {
      background: #12303f;
      border-radius: 40px;
      padding: 16px 12px 24px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 0 3px #3b7a8f;
      max-width: 800px;
      width: 100%;
    }
    canvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: auto;
      border-radius: 28px;
      background: #1b3f50;
      box-shadow: inset 0 0 0 3px #2b6176, 0 0 0 3px #1d485c;
      touch-action: none;
    }
    .top-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 16px 4px 10px;
      color: #f5e5c9;
    }
    .room-card {
      background: #1b4459;
      padding: 10px 20px;
      border-radius: 48px;
      font-weight: bold;
      border-left: 6px solid #f3c26b;
      box-shadow: inset 0 2px 5px #0e2938, 0 5px 0 #0c212c;
      font-size: 1.3rem;
      letter-spacing: 2px;
    }
    .player-badge {
      display: inline-flex;
      align-items: center;
      background: #1d4052;
      padding: 6px 16px;
      border-radius: 30px;
      margin: 4px;
      border: 1px solid #7fb7cc;
    }
    .color-dot {
      width: 18px;
      height: 18px;
      border-radius: 8px;
      margin-right: 10px;
    }
    button {
      background: #2b5e77;
      border: none;
      color: #faf0db;
      font-weight: bold;
      padding: 14px 20px;
      margin: 4px;
      border-radius: 50px;
      font-size: 1rem;
      box-shadow: 0 5px 0 #133544, 0 3px 8px black;
      border-bottom: 2px solid #eebb55;
      transition: all 0.05s;
      cursor: pointer;
      touch-action: manipulation;
      flex: 0 0 auto;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #133544, 0 2px 6px black;
    }
    button.gold {
      background: #da9727;
      border-bottom-color: #ffe5a3;
      color: #0a1c26;
      font-weight: 900;
    }
    .touch-panel {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 16px 0 10px;
    }
    .dir-btn {
      background: #1e4a5e;
      width: 80px;
      height: 80px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      color: #fad98b;
      box-shadow: 0 8px 0 #0d2936, 0 4px 8px black;
      border-bottom: 3px solid #eebb55;
      touch-action: manipulation;
      cursor: pointer;
      user-select: none;
    }
    .dir-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0d2936, 0 2px 6px black;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .hint-area {
      background: #143544;
      padding: 14px 20px;
      border-radius: 48px;
      margin-top: 16px;
      color: #d1e7f5;
      font-weight: 500;
      text-align: center;
      font-size: 1rem;
      border: 1px solid #5997ae;
    }
    input {
      background: #1c4255;
      border: 2px solid #4b8fa8;
      padding: 14px 18px;
      border-radius: 48px;
      color: #ffefcf;
      font-weight: bold;
      font-size: 1.2rem;
      width: 130px;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="720" height="480"></canvas>
  
  <div class="top-panel">
    <div class="room-card" id="roomDisplay">🔘 OFFLINE</div>
    <div class="room-card" id="levelDisplay">🏆 LVL 1</div>
    <div id="playerTags" style="display:flex; flex-wrap:wrap;"></div>
  </div>
  
  <!-- Touch D-Pad -->
  <div class="touch-panel">
    <div class="dir-btn" id="btnUp">⬆️</div>
  </div>
  <div style="display:flex; justify-content:center; gap:20px;">
    <div class="dir-btn" id="btnLeft">⬅️</div>
    <div class="dir-btn" id="btnDown">⬇️</div>
    <div class="dir-btn" id="btnRight">➡️</div>
  </div>
  
  <div style="display:flex; flex-wrap:wrap; justify-content: center; margin: 12px 0;">
    <input type="number" id="joinRoomInput" placeholder="4‑digit code" min="1000" max="9999" maxlength="4" inputmode="numeric">
    <button id="hostBtn" class="gold">🎮 CREATE ROOM</button>
    <button id="joinBtn">🔗 JOIN ROOM</button>
  </div>
  
  <div class="action-row">
    <button id="interactBtn">🖐️ INTERACT</button>
    <button id="shareBtn">🤝 SHARE ITEM</button>
    <button id="resetBtn">🔄 RESET</button>
    <button id="nextBtn">⏩ NEXT LEVEL</button>
  </div>
  
  <div class="hint-area" id="hintMessage">
    👥 Tap 'CREATE ROOM' – you'll get a 4‑digit code to share!
  </div>
</div>

<script>
  (function(){
    "use strict";
    
    // ---------- CONFIG ----------
    const TILE = 40;
    const COLS = 18, ROWS = 12;
    const COLORS = ['#FF8BA7', '#6CC0FF', '#A3D977'];
    const NAMES = ['ALEX', 'BLAKE', 'CASEY'];
    
    // Peer & state
    let peer = null;
    let connections = {};
    let myId = '';
    let isHost = false;
    let currentRoom = '';       // 4-digit code
    
    // Game state (host authoritative)
    let game = {
      level: 0,
      players: {},       // id -> { name, color, x, y, inventory }
      items: [],
      puzzles: [],
      doors: [],
      exit: { x:16, y:10, open:false },
      win: false,
    };
    
    let local = { id:'', name:'You', color:'#ccc', x:2, y:2, inventory:[] };
    let levelData = null;
    
    // UI elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const roomDisplay = document.getElementById('roomDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const playerTags = document.getElementById('playerTags');
    const hintMsg = document.getElementById('hintMessage');
    const joinInput = document.getElementById('joinRoomInput');
    
    // ---------- LEVEL GENERATOR ----------
    function generateLevel(idx) {
      const walls = Array(ROWS).fill().map(() => Array(COLS).fill(0));
      for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) 
        if(r===0||r===ROWS-1||c===0||c===COLS-1) walls[r][c]=1;
      
      for(let r=2; r<ROWS-2; r+=2)
        for(let c=2; c<COLS-2; c+=2)
          if(Math.random()<0.3) walls[r][c] = 1;
      
      walls[2][2]=0; walls[2][3]=0; walls[3][2]=0;
      
      const items = [
        { type:'key', x:5, y:3, collected:false },
        { type:'keycard', x:8, y:4, collected:false }
      ];
      
      const puzzles = [
        { type:'pressure', x:7, y:5, solved:false, required:2, playersOn:0 },
        { type:'code', x:11, y:6, solved:false, code: (100+Math.floor(Math.random()*400)).toString() },
        { type:'lever', levers:[ {x:13,y:7,active:false}, {x:14,y:7,active:false} ], solved:false }
      ];
      
      const doors = [ { x:15, y:8, open:false, required:2 } ];
      const exit = { x:16, y:10, open:false };
      
      return { walls, items, puzzles, doors, exit };
    }
    
    function loadLevel(levelIdx) {
      levelData = generateLevel(levelIdx);
      game.level = levelIdx;
      game.items = JSON.parse(JSON.stringify(levelData.items));
      game.puzzles = JSON.parse(JSON.stringify(levelData.puzzles));
      game.doors = JSON.parse(JSON.stringify(levelData.doors));
      game.exit = { ...levelData.exit, open:false };
      game.win = false;
      
      const spawns = [[2,2],[3,2],[2,3]];
      let i=0;
      for(let pid in game.players) {
        let sp = spawns[i%3];
        game.players[pid].x = sp[0];
        game.players[pid].y = sp[1];
        game.players[pid].inventory = [];
        i++;
      }
      if(local.id) { local.x=2; local.y=2; local.inventory=[]; }
      
      updateUI();
      if(isHost) broadcastState();
    }
    
    // ---------- PEERJS (4‑DIGIT ROOM) ----------
    function generateRoomCode() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }
    
    function initHost(roomCode) {
      isHost = true;
      currentRoom = roomCode;
      
      // Create peer with custom ID = room code
      peer = new Peer(roomCode);
      
      peer.on('open', (id) => {
        myId = id;
        roomDisplay.innerText = `🏷️ ROOM: ${id}`;
        hintMsg.innerText = `✅ Room created! Share code: ${id}`;
        
        local = { id: myId, name:'HOST', color:COLORS[0], x:2, y:2, inventory:[] };
        game.players = { [myId]: local };
        loadLevel(0);
      });
      
      peer.on('connection', (conn) => {
        connections[conn.peer] = conn;
        setupConnection(conn);
        
        const count = Object.keys(game.players).length;
        if(count < 3) {
          const name = NAMES[count] || 'GUEST';
          const color = COLORS[count % COLORS.length];
          game.players[conn.peer] = { id: conn.peer, name, color, x:2, y:2, inventory:[] };
        }
        setTimeout(() => {
          conn.send({ type:'FULL_SYNC', game, levelData });
        }, 200);
        broadcastState();
      });
      
      peer.on('error', (err) => {
        roomDisplay.innerText = `❌ ERROR`;
        hintMsg.innerText = `Error: ${err.type}. Try a different code?`;
      });
    }
    
    function initClient(roomCode) {
      isHost = false;
      peer = new Peer(); // auto ID
      
      peer.on('open', (id) => {
        myId = id;
        const conn = peer.connect(roomCode, { reliable:true });
        connections[roomCode] = conn;
        setupConnection(conn);
        currentRoom = roomCode;
        roomDisplay.innerText = `🔵 JOINED: ${roomCode}`;
        hintMsg.innerText = `👋 Connected! Waiting for host data...`;
      });
      
      peer.on('error', (err) => {
        roomDisplay.innerText = `❌ ERROR`;
        hintMsg.innerText = `Cannot join room ${roomCode}. Check code.`;
      });
    }
    
    function setupConnection(conn) {
      conn.on('data', (data) => handleData(conn.peer, data));
      conn.on('close', () => {
        delete connections[conn.peer];
        if(game.players[conn.peer]) {
          delete game.players[conn.peer];
          if(isHost) broadcastState();
        }
        updatePlayerTags();
      });
    }
    
    function handleData(sender, data) {
      if(!isHost && data.type === 'FULL_SYNC') {
        game = data.game;
        levelData = data.levelData;
        if(game.players[myId]) local = { ...game.players[myId] };
        updateUI();
        hintMsg.innerText = `🎮 Connected! Cooperate to escape.`;
      }
      else if(isHost) {
        if(data.type === 'MOVE') {
          const p = game.players[sender];
          if(p && canMove(data.x, data.y, p)) {
            p.x = data.x; p.y = data.y;
            checkPickup(p);
            checkPuzzles();
            broadcastState();
          }
        } else if(data.type === 'INTERACT') {
          handleInteraction(sender, data.puzzleIdx);
        } else if(data.type === 'SHARE') {
          shareItem(sender);
        } else if(data.type === 'RESET') {
          loadLevel(game.level);
        } else if(data.type === 'NEXT') {
          if(game.win) loadLevel((game.level+1)%700);
        }
      } else {
        if(data.type === 'STATE') {
          game = data.game;
          if(game.players[myId]) local = { ...game.players[myId] };
          updateUI();
        }
      }
    }
    
    function broadcastState() {
      if(!isHost) return;
      const msg = { type:'STATE', game };
      Object.values(connections).forEach(c => c.send(msg));
      updatePlayerTags();
    }
    
    // ---------- GAME LOGIC ----------
    function canMove(nx, ny, player) {
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) return false;
      if(levelData.walls[ny][nx] === 1) return false;
      for(let d of game.doors) if(!d.open && d.x===nx && d.y===ny) return false;
      return true;
    }
    
    function checkPickup(player) {
      game.items.forEach(item => {
        if(!item.collected && item.x===player.x && item.y===player.y) {
          item.collected = true;
          player.inventory.push(item.type);
          hintMsg.innerText = `✅ ${player.name} picked up ${item.type}!`;
        }
      });
    }
    
    function checkPuzzles() {
      game.puzzles.forEach(p => {
        if(p.type==='pressure' && !p.solved) {
          let cnt = 0;
          for(let pid in game.players) if(game.players[pid].x===p.x && game.players[pid].y===p.y) cnt++;
          p.playersOn = cnt;
          if(cnt >= p.required) p.solved = true;
        }
        if(p.type==='lever' && !p.solved) {
          if(p.levers.every(l => l.active)) p.solved = true;
        }
      });
      
      const solved = game.puzzles.filter(p=>p.solved).length;
      game.doors.forEach(d => d.open = solved >= d.required);
      
      const allSolved = game.puzzles.every(p=>p.solved);
      game.exit.open = allSolved;
      for(let pid in game.players) {
        if(game.exit.open && game.players[pid].x===game.exit.x && game.players[pid].y===game.exit.y)
          game.win = true;
      }
    }
    
    function handleInteraction(playerId, puzzleIdx) {
      const player = game.players[playerId];
      const puzzle = game.puzzles[puzzleIdx];
      if(!puzzle || puzzle.solved) return;
      
      if(puzzle.type === 'code') {
        if(player.inventory.includes('key')) {
          puzzle.solved = true;
          hintMsg.innerText = `🔓 Code unlocked with key!`;
        } else {
          hintMsg.innerText = `🔐 Need a key. Code: ${puzzle.code}`;
        }
      } else if(puzzle.type === 'lever') {
        puzzle.levers.forEach(l => {
          if(player.x === l.x && player.y === l.y) l.active = true;
        });
        hintMsg.innerText = `🔧 Lever pulled! Both needed.`;
      }
      checkPuzzles();
      broadcastState();
    }
    
    function shareItem(giverId) {
      const giver = game.players[giverId];
      if(!giver || giver.inventory.length===0) return;
      for(let pid in game.players) {
        if(pid === giverId) continue;
        const other = game.players[pid];
        if(Math.abs(other.x-giver.x)<=1 && Math.abs(other.y-giver.y)<=1) {
          const item = giver.inventory.pop();
          other.inventory.push(item);
          hintMsg.innerText = `🤲 ${giver.name} gave ${item} to ${other.name}`;
          broadcastState();
          return;
        }
      }
      hintMsg.innerText = `👥 Stand next to a teammate.`;
    }
    
    // ---------- LOCAL ACTIONS ----------
    function tryMove(dx, dy) {
      if(!myId || game.win) return;
      const nx = local.x+dx, ny = local.y+dy;
      if(!canMove(nx, ny, local)) return;
      local.x = nx; local.y = ny;
      
      if(isHost) {
        const hostP = game.players[myId];
        hostP.x = nx; hostP.y = ny;
        checkPickup(hostP);
        checkPuzzles();
        broadcastState();
      } else {
        Object.values(connections).forEach(c => c.send({ type:'MOVE', x:nx, y:ny }));
      }
    }
    
    function localInteract() {
      if(!myId) return;
      let idx = -1;
      game.puzzles.forEach((p, i) => {
        if(p.type==='lever') {
          p.levers.forEach(l => { if(l.x===local.x && l.y===local.y) idx = i; });
        } else {
          if(p.x === local.x && p.y === local.y) idx = i;
        }
      });
      if(idx !== -1) {
        if(isHost) handleInteraction(myId, idx);
        else Object.values(connections).forEach(c => c.send({ type:'INTERACT', puzzleIdx: idx }));
      } else {
        hintMsg.innerText = `👀 Stand on a puzzle (🔢, ⚖️, 🔧) to interact.`;
      }
    }
    
    // ---------- RENDER ----------
    function draw() {
      ctx.clearRect(0,0,720,480);
      if(!levelData) return;
      
      for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
          let x=c*TILE, y=r*TILE;
          if(levelData.walls[r][c]) {
            ctx.fillStyle='#3a2e24'; ctx.fillRect(x,y,TILE,TILE);
            ctx.fillStyle='#5d4e3c'; ctx.fillRect(x+2,y+2,TILE-4,TILE-4);
          } else {
            ctx.fillStyle='#1d3d4f'; ctx.fillRect(x,y,TILE,TILE);
            ctx.fillStyle='#2e5a6e'; ctx.fillRect(x+1,y+1,TILE-2,TILE-2);
          }
        }
      }
      
      game.puzzles.forEach(p => {
        if(p.type==='pressure') {
          let x=p.x*TILE, y=p.y*TILE;
          ctx.fillStyle = p.solved?'#a5e0a5':'#7a9eb5';
          ctx.beginPath(); ctx.arc(x+20,y+20,14,0,2*Math.PI); ctx.fill();
          ctx.fillStyle='#fff'; ctx.font='bold 16px sans'; ctx.fillText(`${p.playersOn||0}/2`, x+12,y+28);
        } else if(p.type==='code') {
          let x=p.x*TILE, y=p.y*TILE;
          ctx.fillStyle = p.solved?'#a0e0a0':'#7a9bb5';
          ctx.fillRect(x+5,y+5,30,30);
          ctx.fillStyle='#000'; ctx.font='bold 16px sans'; ctx.fillText('🔢', x+10,y+28);
        } else if(p.type==='lever') {
          p.levers.forEach(l => {
            let x=l.x*TILE, y=l.y*TILE;
            ctx.fillStyle = l.active?'#b3ff9b':'#b58a6f';
            ctx.fillRect(x+8,y+8,24,24);
            ctx.fillStyle='#000'; ctx.fillText('🔧', x+12,y+28);
          });
        }
      });
      
      game.items.filter(i=>!i.collected).forEach(it => {
        let x=it.x*TILE, y=it.y*TILE;
        ctx.fillStyle = it.type==='key'?'#FFD966':'#b0c4de';
        ctx.beginPath(); ctx.arc(x+20,y+20,10,0,2*Math.PI); ctx.fill();
        ctx.fillStyle='#000'; ctx.fillText(it.type[0], x+16,y+26);
      });
      
      game.doors.filter(d=>!d.open).forEach(d => {
        let x=d.x*TILE, y=d.y*TILE;
        ctx.fillStyle='#6b4f32'; ctx.fillRect(x+4,y+4,32,32);
        ctx.fillStyle='#9b7e5a'; ctx.fillRect(x+8,y+8,24,24);
      });
      
      const ex = game.exit;
      ctx.fillStyle = ex.open?'#b3ffaa':'#5f735f';
      ctx.fillRect(ex.x*TILE+8, ex.y*TILE+8, 24,24);
      ctx.fillStyle='#fff'; ctx.font='bold 20px sans'; ctx.fillText('🚪', ex.x*TILE+12, ex.y*TILE+30);
      
      for(let pid in game.players) {
        const p = game.players[pid];
        ctx.fillStyle = p.color;
        ctx.shadowColor='#fff6'; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(p.x*TILE+20, p.y*TILE+20, 15, 0, 2*Math.PI); ctx.fill();
        ctx.shadowBlur=0;
        ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle='white'; ctx.font='bold 12px sans'; ctx.fillText(p.name, p.x*TILE+8, p.y*TILE+8);
        if(p.inventory.length) {
          ctx.fillStyle='#FFD966'; ctx.beginPath(); ctx.arc(p.x*TILE+30, p.y*TILE+8, 7, 0, 2*Math.PI); ctx.fill();
        }
      }
      
      if(game.win) {
        ctx.fillStyle='#fad98b'; ctx.font='bold 32px sans'; ctx.fillText('✨ ESCAPED! ✨', 160, 200);
      }
      
      levelDisplay.innerText = `🏆 LVL ${game.level+1}`;
      updatePlayerTags();
      requestAnimationFrame(draw);
    }
    
    function updatePlayerTags() {
      let html = '';
      for(let pid in game.players) {
        const p = game.players[pid];
        html += `<div class="player-badge"><span class="color-dot" style="background:${p.color}"></span>${p.name} ${p.inventory.length?'📦':''}</div>`;
      }
      playerTags.innerHTML = html || '<span style="color:#aaa">waiting...</span>';
    }
    
    function updateUI() {
      updatePlayerTags();
      levelDisplay.innerText = `🏆 LVL ${game.level+1}`;
    }
    
    // ---------- EVENT LISTENERS ----------
    function bindControls() {
      document.getElementById('btnUp').addEventListener('click', ()=>tryMove(0,-1));
      document.getElementById('btnDown').addEventListener('click', ()=>tryMove(0,1));
      document.getElementById('btnLeft').addEventListener('click', ()=>tryMove(-1,0));
      document.getElementById('btnRight').addEventListener('click', ()=>tryMove(1,0));
      
      window.addEventListener('keydown', (e) => {
        if(e.key==='ArrowUp'||e.key==='w') { tryMove(0,-1); e.preventDefault(); }
        if(e.key==='ArrowDown'||e.key==='s') { tryMove(0,1); e.preventDefault(); }
        if(e.key==='ArrowLeft'||e.key==='a') { tryMove(-1,0); e.preventDefault(); }
        if(e.key==='ArrowRight'||e.key==='d') { tryMove(1,0); e.preventDefault(); }
        if(e.key==='e'||e.key==='E') { localInteract(); e.preventDefault(); }
      });
      
      document.getElementById('hostBtn').addEventListener('click', () => {
        if(peer) peer.destroy();
        const code = generateRoomCode();
        initHost(code);
        roomDisplay.innerText = `🟡 CREATING...`;
        hintMsg.innerText = `🔄 Generating room...`;
      });
      
      document.getElementById('joinBtn').addEventListener('click', () => {
        const code = joinInput.value.trim();
        if(!code || code.length!==4 || isNaN(code)) {
          hintMsg.innerText = `❌ Please enter a 4‑digit code.`;
          return;
        }
        if(peer) peer.destroy();
        initClient(code);
      });
      
      document.getElementById('interactBtn').addEventListener('click', localInteract);
      document.getElementById('shareBtn').addEventListener('click', ()=>{
        if(isHost) shareItem(myId);
        else Object.values(connections).forEach(c=>c.send({type:'SHARE'}));
      });
      document.getElementById('resetBtn').addEventListener('click', ()=>{
        if(isHost) loadLevel(game.level);
        else Object.values(connections).forEach(c=>c.send({type:'RESET'}));
      });
      document.getElementById('nextBtn').addEventListener('click', ()=>{
        if(!game.win) { hintMsg.innerText='🚫 Solve all puzzles first!'; return; }
        if(isHost) loadLevel((game.level+1)%700);
        else Object.values(connections).forEach(c=>c.send({type:'NEXT'}));
      });
    }
    
    // Start
    bindControls();
    levelData = generateLevel(0);
    game.players = {};
    requestAnimationFrame(draw);
    roomDisplay.innerText = `⚫ TAP 'CREATE ROOM'`;
    hintMsg.innerText = `👥 Tap CREATE to get a 4‑digit room code!`;
  })();
</script>
</body>
</html>
