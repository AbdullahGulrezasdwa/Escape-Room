<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3‑Player Escape Room</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }
    #lobby, #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.6);
        padding: 15px;
        border-radius: 8px;
    }
    #ui { display: none; }
    input, button {
        padding: 6px;
        margin: 4px;
        border-radius: 4px;
        border: none;
    }
    #roomInfo {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.6);
        padding: 15px;
        border-radius: 8px;
        display: none;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="600"></canvas>

<div id="lobby">
    <h2>Multiplayer Lobby</h2>
    <p id="myId">Your ID: ...</p>

    <input id="playerName" placeholder="Your Name">
    <input id="playerColor" placeholder="Color (e.g. red)">
    <br>

    <button id="createRoomBtn">Create Room</button>
    <br><br>

    <input id="roomIdInput" placeholder="Room ID">
    <button id="joinRoomBtn">Join Room</button>

    <p id="status"></p>
</div>

<div id="ui">
    <h3>Room Controls</h3>
    <p id="roomTitle"></p>
    <p id="roomDesc"></p>

    <input id="codeInput" placeholder="Enter Code">
    <button id="submitCode">Submit</button>

    <p id="feedback"></p>
</div>

<div id="roomInfo">
    <h3>Room</h3>
    <p id="roomNumber"></p>
</div>

<script>
/* -------------------------
   CANVAS + GAME STATE
--------------------------*/
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let peer = new Peer();
let connections = [];
let isHost = false;
let roomId = null;

let localId = null;
let roles = {}; // assign roles 1,2,3

let gameState = {
    roomIndex: 0,
    players: {}
};

/* -------------------------
   50 HARDCODED ROOMS
--------------------------*/
const rooms = [
    {title:"Room 1", code:"1234", desc:"A simple warm‑up puzzle."},
    {title:"Room 2", code:"8421", desc:"Numbers are scrambled."},
    {title:"Room 3", code:"9901", desc:"Look closely at the walls."},
    {title:"Room 4", code:"5555", desc:"Repeating pattern."},
    {title:"Room 5", code:"2048", desc:"A familiar number."},
    {title:"Room 6", code:"7771", desc:"Lucky but tricky."},
    {title:"Room 7", code:"3141", desc:"Pi is everywhere."},
    {title:"Room 8", code:"2026", desc:"A year to remember."},
    {title:"Room 9", code:"9000", desc:"It's over 9000!"},
    {title:"Room 10", code:"1111", desc:"Uniform digits."},
    {title:"Room 11", code:"2468", desc:"Even numbers only."},
    {title:"Room 12", code:"1357", desc:"Odd numbers only."},
    {title:"Room 13", code:"4321", desc:"Reverse order."},
    {title:"Room 14", code:"8080", desc:"Mirrored digits."},
    {title:"Room 15", code:"9999", desc:"Max difficulty? Not yet."},
    {title:"Room 16", code:"1010", desc:"Binary vibes."},
    {title:"Room 17", code:"1212", desc:"Repeating pairs."},
    {title:"Room 18", code:"1818", desc:"Echo puzzle."},
    {title:"Room 19", code:"7007", desc:"Secret agent code."},
    {title:"Room 20", code:"6006", desc:"Symmetry matters."},
    {title:"Room 21", code:"1230", desc:"Almost familiar."},
    {title:"Room 22", code:"9090", desc:"Flip it."},
    {title:"Room 23", code:"8880", desc:"One odd one out."},
    {title:"Room 24", code:"2223", desc:"Three of a kind."},
    {title:"Room 25", code:"1717", desc:"Repeating rhythm."},
    {title:"Room 26", code:"5151", desc:"Pattern continues."},
    {title:"Room 27", code:"3330", desc:"One missing."},
    {title:"Room 28", code:"4441", desc:"Odd ending."},
    {title:"Room 29", code:"9091", desc:"Almost mirrored."},
    {title:"Room 30", code:"2020", desc:"A clear pattern."},
    {title:"Room 31", code:"3030", desc:"Alternating zeros."},
    {title:"Room 32", code:"4040", desc:"Echo again."},
    {title:"Room 33", code:"5050", desc:"Half and half."},
    {title:"Room 34", code:"6161", desc:"Repeating again."},
    {title:"Room 35", code:"7272", desc:"Up and down."},
    {title:"Room 36", code:"8383", desc:"Mirror rhythm."},
    {title:"Room 37", code:"9494", desc:"Almost there."},
    {title:"Room 38", code:"1239", desc:"Unexpected twist."},
    {title:"Room 39", code:"6789", desc:"Climbing up."},
    {title:"Room 40", code:"9876", desc:"Climbing down."},
    {title:"Room 41", code:"1122", desc:"Two pairs."},
    {title:"Room 42", code:"4242", desc:"Repeating life."},
    {title:"Room 43", code:"7373", desc:"Strange pattern."},
    {title:"Room 44", code:"8881", desc:"Odd ending again."},
    {title:"Room 45", code:"1001", desc:"Palindrome."},
    {title:"Room 46", code:"1221", desc:"Another palindrome."},
    {title:"Room 47", code:"2112", desc:"Reverse palindrome."},
    {title:"Room 48", code:"4554", desc:"Symmetry rules."},
    {title:"Room 49", code:"6996", desc:"Perfect mirror."},
    {title:"Room 50", code:"7777", desc:"Final challenge!"}
];

/* -------------------------
   PEERJS SETUP
--------------------------*/
peer.on("open", id => {
    localId = id;
    document.getElementById("myId").textContent = "Your ID: " + id;
});

function setupConnection(conn) {
    connections.push(conn);

    conn.on("data", msg => {
        if (msg.type === "STATE") {
            gameState = msg.state;
            render();
            updateRoomUI();
        }
    });

    conn.on("open", () => {
        document.getElementById("status").textContent =
            "Players connected: " + (connections.length + 1);
    });
}

document.getElementById("createRoomBtn").onclick = () => {
    isHost = true;
    roomId = localId;
    document.getElementById("status").textContent =
        "Room created. Share ID: " + roomId;
};

document.getElementById("joinRoomBtn").onclick = () => {
    const target = document.getElementById("roomIdInput").value.trim();
    if (!target) return;
    const conn = peer.connect(target);
    setupConnection(conn);
};

peer.on("connection", conn => {
    if (connections.length >= 2) return; // max 3 players
    setupConnection(conn);
});

/* -------------------------
   PLAYER SETUP
--------------------------*/
function initPlayer() {
    const name = document.getElementById("playerName").value || "Player";
    const color = document.getElementById("playerColor").value || "cyan";

    gameState.players[localId] = {
        x: 100 + Math.random()*200,
        y: 100 + Math.random()*200,
        name,
        color
    };

    document.getElementById("lobby").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("roomInfo").style.display = "block";

    render();
    updateRoomUI();
}

document.getElementById("playerName").addEventListener("change", initPlayer);
document.getElementById("playerColor").addEventListener("change", initPlayer);

/* -------------------------
   MOVEMENT
--------------------------*/
window.addEventListener("keydown", e => {
    const p = gameState.players[localId];
    if (!p) return;

    if (e.key === "ArrowUp") p.y -= 10;
    if (e.key === "ArrowDown") p.y += 10;
    if (e.key === "ArrowLeft") p.x -= 10;
    if (e.key === "ArrowRight") p.x += 10;

    syncState();
    render();
});

/* -------------------------
   ROOM LOGIC
--------------------------*/
document.getElementById("submitCode").onclick = () => {
    const input = document.getElementById("codeInput").value.trim();
    const room = rooms[gameState.roomIndex];

    if (input === room.code) {
        document.getElementById("feedback").textContent = "Correct! Moving on...";
        gameState.roomIndex++;
        if (gameState.roomIndex >= rooms.length) {
            gameState.roomIndex = rooms.length - 1;
            document.getElementById("feedback").textContent = "You escaped all 50 rooms!";
        }
        syncState();
        updateRoomUI();
    } else {
        document.getElementById("feedback").textContent = "Wrong code!";
    }
};

/* -------------------------
   SYNC
--------------------------*/
function syncState() {
    connections.forEach(c => c.send({type:"STATE", state:gameState}));
}

/* -------------------------
   RENDERING
--------------------------*/
function render() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // draw puzzle box
    ctx.fillStyle = "#444";
    ctx.fillRect(350, 200, 200, 200);

    // draw players
    for (let id in gameState.players) {
        const p = gameState.players[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 30, 30);

        ctx.fillStyle = "white";
        ctx.fillText(p.name, p.x, p.y - 5);
    }
}

function updateRoomUI() {
    const room = rooms[gameState.roomIndex];
    document.getElementById("roomTitle").textContent = room.title;
    document.getElementById("roomDesc").textContent = room.desc;
    document.getElementById("roomNumber").textContent =
        "Room " + (gameState.roomIndex + 1) + " / 50";
}

</script>
</body>
</html>
