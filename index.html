<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>👥 3D ESCAPE · FIRST PERSON · 4‑DIGIT ROOM</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111;
      touch-action: none;
    }
    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
      color: white;
      text-shadow: 2px 2px 4px black;
    }
    .badge {
      background: rgba(20,40,60,0.8);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: bold;
      border-left: 6px solid #f3c26b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      pointer-events: none;
      color: #f5e5c9;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      z-index: 20;
    }
    .joystick-area {
      width: 140px;
      height: 140px;
      background: rgba(30,50,70,0.6);
      backdrop-filter: blur(5px);
      border-radius: 70px;
      border: 3px solid #7fb7cc;
      margin-bottom: 10px;
      pointer-events: auto;
      touch-action: none;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
      pointer-events: auto;
      margin: 10px 0;
    }
    button {
      background: #2b5e77;
      border: none;
      color: #faf0db;
      font-weight: bold;
      padding: 16px 24px;
      border-radius: 60px;
      font-size: 1.2rem;
      box-shadow: 0 6px 0 #133544, 0 4px 10px black;
      border-bottom: 2px solid #eebb55;
      cursor: pointer;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
      background: rgba(43,94,119,0.9);
    }
    button.gold {
      background: #da9727;
      border-bottom-color: #ffe5a3;
      color: #0a1c26;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #133544, 0 2px 6px black;
    }
    #roomInputArea {
      position: absolute;
      bottom: 180px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
      pointer-events: auto;
      z-index: 25;
    }
    input {
      background: rgba(28,66,85,0.9);
      border: 2px solid #4b8fa8;
      padding: 14px;
      border-radius: 48px;
      color: #ffefcf;
      font-weight: bold;
      font-size: 1.2rem;
      width: 140px;
      text-align: center;
      backdrop-filter: blur(8px);
      outline: none;
    }
    #hint {
      position: absolute;
      bottom: 260px;
      left: 20px;
      right: 20px;
      text-align: center;
      color: #d1e7f5;
      background: rgba(20,53,68,0.7);
      padding: 12px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      font-weight: 500;
      z-index: 15;
      pointer-events: none;
    }
    #lookIndicator {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px cyan;
      z-index: 5;
    }
    @media (max-width: 600px) {
      button { padding: 12px 16px; font-size: 1rem; }
    }
  </style>
  <!-- Three.js and PeerJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- Simple touch joystick (no external lib) -->
</head>
<body>
  <div id="info">
    <div class="badge" id="roomDisplay">🔘 OFFLINE</div>
    <div class="badge" id="levelDisplay">🏆 LVL 1</div>
    <div id="playerTags" style="display:flex; gap:8px;"></div>
  </div>
  <div id="lookIndicator"></div>
  <div id="hint" id="hintMessage">👥 Tap 'CREATE ROOM' – get a 4‑digit code!</div>
  
  <div id="roomInputArea">
    <input type="number" id="joinRoomInput" placeholder="4‑digit code" min="1000" max="9999" inputmode="numeric">
    <button id="hostBtn" class="gold">🎮 CREATE</button>
    <button id="joinBtn">🔗 JOIN</button>
  </div>
  
  <div id="controls">
    <div class="joystick-area" id="joystick"></div>
    <div class="action-buttons">
      <button id="interactBtn">🖐️ INTERACT</button>
      <button id="shareBtn">🤝 SHARE</button>
      <button id="resetBtn">🔄 RESET</button>
      <button id="nextBtn">⏩ NEXT</button>
    </div>
  </div>

<script>
  (function(){
    "use strict";
    
    // ---------- CONFIG ----------
    const COLORS = ['#FF8BA7', '#6CC0FF', '#A3D977'];
    const NAMES = ['ALEX', 'BLAKE', 'CASEY'];
    
    // Peer & state
    let peer = null;
    let connections = {};
    let myId = '';
    let isHost = false;
    let currentRoom = '';
    
    // Game state (host authoritative)
    let game = {
      level: 0,
      players: {},       // id -> { name, color, pos: {x,y,z}, rotY, inventory, headRot? }
      items: [],          // {type, pos, collected}
      puzzles: [],
      doors: [],
      exit: { pos: {x:8, y:0.5, z:8}, open:false },
      win: false,
    };
    
    let localPlayer = { id:'', name:'You', color:'#ccc', inventory:[] };
    
    // Three.js globals
    let scene, camera, renderer;
    let playerMeshes = {}; // id -> group
    let roomObjects = [];
    let puzzleMeshes = [];
    let itemMeshes = [];
    let doorMesh, exitMesh;
    
    // First person controls
    let moveState = { forward:0, right:0 };
    let rotationY = 0; // radians
    let pitch = 0; // up/down
    const moveSpeed = 0.12;
    const rotSpeed = 0.005;
    
    // Touch joystick
    let joystickActive = false;
    let joystickCenter = { x:0, y:0 };
    let joystickVector = { x:0, y:0 };
    const joystickEl = document.getElementById('joystick');
    
    // UI elements
    const roomDisplay = document.getElementById('roomDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const playerTags = document.getElementById('playerTags');
    const hintMsg = document.getElementById('hint');
    const joinInput = document.getElementById('joinRoomInput');
    
    // ---------- LEVEL DATA (3D) ----------
    function buildLevel(idx) {
      // Simple room: walls, floor, ceiling
      // Puzzles: pressure plate (needs 2 players), code panel, lever
      const items = [
        { type:'key', pos:{x:2, y:0.5, z:3}, collected:false },
        { type:'keycard', pos:{x:6, y:0.5, z:2}, collected:false }
      ];
      
      const puzzles = [
        { type:'pressure', pos:{x:4, y:0.1, z:5}, solved:false, required:2, playersOn:0 },
        { type:'code', pos:{x:7, y:1.2, z:6}, solved:false, code: (100+Math.floor(Math.random()*400)).toString() },
        { type:'lever', levers:[ {pos:{x:5, y:1, z:7}, active:false}, {pos:{x:6, y:1, z:7}, active:false} ], solved:false }
      ];
      
      const doors = [ { pos:{x:8, y:1, z:4}, open:false, required:2 } ];
      const exit = { pos:{x:9, y:0.5, z:5}, open:false };
      
      return { items, puzzles, doors, exit };
    }
    
    let levelData = buildLevel(0);
    
    function loadLevel(levelIdx) {
      levelData = buildLevel(levelIdx);
      game.level = levelIdx;
      game.items = JSON.parse(JSON.stringify(levelData.items));
      game.puzzles = JSON.parse(JSON.stringify(levelData.puzzles));
      game.doors = JSON.parse(JSON.stringify(levelData.doors));
      game.exit = { ...levelData.exit, open:false };
      game.win = false;
      
      // Reset player positions
      for(let pid in game.players) {
        game.players[pid].pos = { x:1, y:0.5, z:1 };
        game.players[pid].inventory = [];
      }
      if(localPlayer.id) {
        localPlayer.pos = { x:1, y:0.5, z:1 };
        localPlayer.inventory = [];
      }
      
      rebuildScene();
      updateUI();
      if(isHost) broadcastState();
    }
    
    // ---------- THREE.JS SETUP ----------
    function init3D() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a3a4a);
      scene.fog = new THREE.Fog(0x1a3a4a, 20, 40);
      
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(1, 1.5, 3);
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);
      
      // Lighting
      const ambient = new THREE.AmbientLight(0x404060);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
      dirLight.position.set(5, 12, 8);
      dirLight.castShadow = true;
      dirLight.receiveShadow = true;
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      scene.add(dirLight);
      const fillLight = new THREE.PointLight(0x5577aa, 0.6);
      fillLight.position.set(2, 4, 5);
      scene.add(fillLight);
      
      rebuildScene();
      
      // Events
      window.addEventListener('resize', onWindowResize);
      setupTouchControls();
      
      // Keyboard
      window.addEventListener('keydown', (e) => {
        if(e.key==='w') moveState.forward = 1;
        if(e.key==='s') moveState.forward = -1;
        if(e.key==='a') moveState.right = -1;
        if(e.key==='d') moveState.right = 1;
        if(e.key==='e') localInteract();
        e.preventDefault();
      });
      window.addEventListener('keyup', (e) => {
        if(e.key==='w'||e.key==='s') moveState.forward = 0;
        if(e.key==='a'||e.key==='d') moveState.right = 0;
      });
      
      // Mouse look (only for desktop)
      document.addEventListener('mousemove', (e) => {
        if(e.buttons !== 1) return; // left button
        rotationY -= e.movementX * rotSpeed;
        pitch -= e.movementY * rotSpeed * 0.5;
        pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
      });
      
      animate();
    }
    
    function rebuildScene() {
      // Clear old objects
      roomObjects.forEach(o => scene.remove(o));
      puzzleMeshes.forEach(m => scene.remove(m));
      itemMeshes.forEach(m => scene.remove(m));
      if(doorMesh) scene.remove(doorMesh);
      if(exitMesh) scene.remove(exitMesh);
      
      // Floor
      const floorGeo = new THREE.PlaneGeometry(12, 12);
      const floorMat = new THREE.MeshStandardMaterial({ color:0x3a5f6e, roughness:0.7, metalness:0.1 });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI/2;
      floor.position.y = 0;
      floor.receiveShadow = true;
      scene.add(floor);
      roomObjects.push(floor);
      
      // Walls (simple box room)
      const wallMaterial = new THREE.MeshStandardMaterial({ color:0x8b7a6b, roughness:0.8 });
      const addWall = (w,h,d, x,y,z) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMaterial);
        mesh.position.set(x,y,z);
        mesh.receiveShadow = true;
        mesh.castShadow = true;
        scene.add(mesh);
        roomObjects.push(mesh);
      };
      // back wall
      addWall(12, 4, 0.5, 0, 2, -6);
      // front wall with door opening? we'll keep simple
      addWall(12, 4, 0.5, 0, 2, 6);
      addWall(0.5, 4, 12, -6, 2, 0);
      addWall(0.5, 4, 12, 6, 2, 0);
      
      // Ceiling
      const ceil = new THREE.Mesh(new THREE.PlaneGeometry(12,12), new THREE.MeshStandardMaterial({color:0x4a5b6e, side:THREE.DoubleSide}));
      ceil.rotation.x = Math.PI/2;
      ceil.position.y = 4;
      scene.add(ceil);
      
      // Puzzles
      levelData.puzzles.forEach((p, i) => {
        if(p.type==='pressure') {
          const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,0.1,16), new THREE.MeshStandardMaterial({color:0x7a9eb5}));
          plate.position.set(p.pos.x, p.pos.y, p.pos.z);
          plate.receiveShadow = true;
          scene.add(plate);
          puzzleMeshes.push(plate);
          p.mesh = plate;
        } else if(p.type==='code') {
          const panel = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.2), new THREE.MeshStandardMaterial({color:0x7a9bb5}));
          panel.position.set(p.pos.x, p.pos.y, p.pos.z);
          panel.castShadow = true;
          scene.add(panel);
          puzzleMeshes.push(panel);
        } else if(p.type==='lever') {
          p.levers.forEach(l => {
            const lever = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.6,0.2), new THREE.MeshStandardMaterial({color:0xb58a6f}));
            lever.position.set(l.pos.x, l.pos.y, l.pos.z);
            lever.castShadow = true;
            scene.add(lever);
            puzzleMeshes.push(lever);
          });
        }
      });
      
      // Items
      levelData.items.forEach(it => {
        if(!it.collected) {
          const geom = it.type==='key' ? new THREE.ConeGeometry(0.3,0.6,8) : new THREE.BoxGeometry(0.4,0.1,0.6);
          const mat = new THREE.MeshStandardMaterial({color: it.type==='key'?0xFFD966:0xb0c4de});
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(it.pos.x, it.pos.y+0.3, it.pos.z);
          mesh.castShadow = true;
          scene.add(mesh);
          itemMeshes.push(mesh);
        }
      });
      
      // Door
      const doorGeom = new THREE.BoxGeometry(1.5, 2.5, 0.3);
      const doorMat = new THREE.MeshStandardMaterial({color:0x6b4f32});
      doorMesh = new THREE.Mesh(doorGeom, doorMat);
      doorMesh.position.set(levelData.doors[0].pos.x, levelData.doors[0].pos.y, levelData.doors[0].pos.z);
      doorMesh.castShadow = true;
      doorMesh.receiveShadow = true;
      scene.add(doorMesh);
      
      // Exit
      const exitGeom = new THREE.BoxGeometry(1,2,0.3);
      exitMesh = new THREE.Mesh(exitGeom, new THREE.MeshStandardMaterial({color:0x5f735f, emissive: new THREE.Color(0x224422)}));
      exitMesh.position.set(game.exit.pos.x, game.exit.pos.y+1, game.exit.pos.z);
      scene.add(exitMesh);
    }
    
    function createPlayerMesh(player) {
      const group = new THREE.Group();
      
      // Body
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.2,0.5), new THREE.MeshStandardMaterial({color:player.color}));
      body.position.y = 0.9;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);
      
      // Head
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color:0xffddbb}));
      head.position.y = 1.7;
      head.castShadow = true;
      group.add(head);
      
      // Arms
      const armMat = new THREE.MeshStandardMaterial({color:player.color});
      const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), armMat);
      leftArm.position.set(-0.6,1.3,0);
      leftArm.castShadow = true;
      group.add(leftArm);
      const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), armMat);
      rightArm.position.set(0.6,1.3,0);
      rightArm.castShadow = true;
      group.add(rightArm);
      
      return group;
    }
    
    // ---------- PEERJS (4‑DIGIT) ----------
    function generateRoomCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }
    
    function initHost(code) {
      isHost = true; currentRoom = code;
      peer = new Peer(code);
      peer.on('open', id => {
        myId = id;
        roomDisplay.innerText = `🏷️ ROOM: ${id}`;
        hintMsg.innerText = `✅ Room created! Share code: ${id}`;
        localPlayer = { id: myId, name:'HOST', color:COLORS[0], pos:{x:1,y:0.5,z:1}, inventory:[] };
        game.players = { [myId]: localPlayer };
        loadLevel(0);
        addPlayerMesh(myId, localPlayer);
      });
      peer.on('connection', conn => {
        connections[conn.peer] = conn;
        setupConnection(conn);
        const count = Object.keys(game.players).length;
        if(count < 3) {
          const name = NAMES[count]||'GUEST';
          const color = COLORS[count%COLORS.length];
          game.players[conn.peer] = { id:conn.peer, name, color, pos:{x:1,y:0.5,z:1}, inventory:[] };
          addPlayerMesh(conn.peer, game.players[conn.peer]);
        }
        setTimeout(() => conn.send({ type:'FULL_SYNC', game, levelData }), 200);
        broadcastState();
      });
      peer.on('error', e => hintMsg.innerText = `Error: ${e.type}`);
    }
    
    function initClient(code) {
      isHost = false;
      peer = new Peer();
      peer.on('open', id => {
        myId = id;
        const conn = peer.connect(code, {reliable:true});
        connections[code] = conn;
        setupConnection(conn);
        currentRoom = code;
        roomDisplay.innerText = `🔵 JOINED: ${code}`;
        hintMsg.innerText = `👋 Connected! Waiting...`;
      });
    }
    
    function setupConnection(conn) {
      conn.on('data', data => handleData(conn.peer, data));
      conn.on('close', () => {
        delete connections[conn.peer];
        if(game.players[conn.peer]) {
          removePlayerMesh(conn.peer);
          delete game.players[conn.peer];
          if(isHost) broadcastState();
        }
      });
    }
    
    function handleData(sender, data) {
      if(!isHost && data.type==='FULL_SYNC') {
        game = data.game;
        levelData = data.levelData;
        rebuildScene();
        // create meshes for existing players
        for(let pid in game.players) {
          if(pid !== myId) addPlayerMesh(pid, game.players[pid]);
        }
        if(game.players[myId]) localPlayer = game.players[myId];
        updateUI();
      }
      else if(isHost) {
        if(data.type==='MOVE') {
          const p = game.players[sender];
          if(p) { p.pos = data.pos; p.rotY = data.rotY; }
          updatePlayerMesh(sender);
          checkPuzzles();
          broadcastState();
        } else if(data.type==='INTERACT') handleInteraction(sender, data.puzzleIdx);
        else if(data.type==='SHARE') shareItem(sender);
        else if(data.type==='RESET') loadLevel(game.level);
        else if(data.type==='NEXT' && game.win) loadLevel((game.level+1)%700);
      } else {
        if(data.type==='STATE') {
          game = data.game;
          // update other player meshes
          for(let pid in game.players) {
            if(pid !== myId) {
              if(!playerMeshes[pid]) addPlayerMesh(pid, game.players[pid]);
              else updatePlayerMesh(pid);
            }
          }
          updateUI();
        }
      }
    }
    
    function broadcastState() {
      if(!isHost) return;
      const msg = { type:'STATE', game };
      Object.values(connections).forEach(c => c.send(msg));
    }
    
    function addPlayerMesh(pid, p) {
      const mesh = createPlayerMesh(p);
      mesh.position.set(p.pos.x, p.pos.y, p.pos.z);
      scene.add(mesh);
      playerMeshes[pid] = mesh;
    }
    function removePlayerMesh(pid) {
      if(playerMeshes[pid]) scene.remove(playerMeshes[pid]);
      delete playerMeshes[pid];
    }
    function updatePlayerMesh(pid) {
      const mesh = playerMeshes[pid];
      const p = game.players[pid];
      if(mesh && p) {
        mesh.position.set(p.pos.x, p.pos.y, p.pos.z);
        mesh.rotation.y = p.rotY || 0;
      }
    }
    
    // ---------- GAME LOGIC (3D collisions simplified) ----------
    function canMoveTo(pos) {
      // simple wall collision (bounds)
      if(pos.x < -5.5 || pos.x > 5.5 || pos.z < -5.5 || pos.z > 5.5) return false;
      if(game.doors[0] && !game.doors[0].open) {
        const d = game.doors[0].pos;
        if(Math.abs(pos.x-d.x)<0.8 && Math.abs(pos.z-d.z)<0.8) return false;
      }
      return true;
    }
    
    function checkPickup() {
      game.items.forEach(it => {
        if(!it.collected) {
          const dist = Math.sqrt((localPlayer.pos.x-it.pos.x)**2 + (localPlayer.pos.z-it.pos.z)**2);
          if(dist < 1.2) {
            it.collected = true;
            localPlayer.inventory.push(it.type);
            hintMsg.innerText = `✅ Picked up ${it.type}!`;
            rebuildScene();
          }
        }
      });
    }
    
    function checkPuzzles() {
      // pressure plate
      game.puzzles.forEach(p => {
        if(p.type==='pressure' && !p.solved) {
          let cnt = 0;
          for(let pid in game.players) {
            const pl = game.players[pid];
            const dist = Math.sqrt((pl.pos.x-p.pos.x)**2 + (pl.pos.z-p.pos.z)**2);
            if(dist < 1.0) cnt++;
          }
          p.playersOn = cnt;
          if(cnt >= p.required) p.solved = true;
          if(p.mesh) p.mesh.material.color.setHex(p.solved?0xa5e0a5:0x7a9eb5);
        }
      });
      
      const solved = game.puzzles.filter(p=>p.solved).length;
      game.doors.forEach(d => d.open = solved >= d.required);
      if(doorMesh) doorMesh.visible = !game.doors[0].open;
      
      const allSolved = game.puzzles.every(p=>p.solved);
      game.exit.open = allSolved;
      if(exitMesh) exitMesh.material.emissive.setHex(allSolved?0x88ff88:0x224422);
      
      // win
      if(game.exit.open) {
        const dist = Math.sqrt((localPlayer.pos.x-game.exit.pos.x)**2 + (localPlayer.pos.z-game.exit.pos.z)**2);
        if(dist < 1.5) game.win = true;
      }
    }
    
    function handleInteraction(playerId, idx) {
      const player = game.players[playerId];
      const puzzle = game.puzzles[idx];
      if(!puzzle || puzzle.solved) return;
      
      if(puzzle.type==='code') {
        if(player.inventory.includes('key')) {
          puzzle.solved = true;
          hintMsg.innerText = `🔓 Code unlocked!`;
        } else hintMsg.innerText = `🔐 Need key. Code: ${puzzle.code}`;
      } else if(puzzle.type==='lever') {
        puzzle.levers.forEach(l => {
          if(Math.abs(player.pos.x-l.pos.x)<0.8 && Math.abs(player.pos.z-l.pos.z)<0.8) l.active = true;
        });
        if(puzzle.levers.every(l=>l.active)) puzzle.solved = true;
      }
      checkPuzzles();
      broadcastState();
    }
    
    function shareItem(giverId) {
      const giver = game.players[giverId];
      if(!giver || !giver.inventory.length) return;
      for(let pid in game.players) {
        if(pid===giverId) continue;
        const other = game.players[pid];
        const dist = Math.sqrt((giver.pos.x-other.pos.x)**2 + (giver.pos.z-other.pos.z)**2);
        if(dist < 2) {
          const item = giver.inventory.pop();
          other.inventory.push(item);
          hintMsg.innerText = `🤲 Shared ${item}`;
          broadcastState();
          return;
        }
      }
    }
    
    // ---------- LOCAL CONTROLS ----------
    function localMove() {
      if(!myId || game.win) return;
      const forward = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,rotationY,0));
      const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0,rotationY,0));
      
      let dx = forward.x * moveState.forward + right.x * moveState.right;
      let dz = forward.z * moveState.forward + right.z * moveState.right;
      
      if(joystickActive) {
        dx = joystickVector.x * 0.15;
        dz = -joystickVector.y * 0.15;
      }
      
      if(dx!==0 || dz!==0) {
        const newPos = {
          x: localPlayer.pos.x + dx,
          y: 0.5,
          z: localPlayer.pos.z + dz
        };
        if(canMoveTo(newPos)) {
          localPlayer.pos = newPos;
          if(isHost) {
            game.players[myId].pos = newPos;
            game.players[myId].rotY = rotationY;
            checkPickup();
            checkPuzzles();
            broadcastState();
          } else {
            Object.values(connections).forEach(c => c.send({type:'MOVE', pos:newPos, rotY:rotationY}));
          }
          updatePlayerMesh(myId);
        }
      }
      
      camera.position.set(localPlayer.pos.x, localPlayer.pos.y+1.2, localPlayer.pos.z);
      camera.rotation.set(pitch, rotationY, 0, 'YXZ');
    }
    
    function localInteract() {
      if(!myId) return;
      // find nearby puzzle
      let idx = -1;
      game.puzzles.forEach((p,i) => {
        if(p.type==='lever') {
          p.levers.forEach(l => {
            if(Math.abs(localPlayer.pos.x-l.pos.x)<1 && Math.abs(localPlayer.pos.z-l.pos.z)<1) idx=i;
          });
        } else {
          if(Math.abs(localPlayer.pos.x-p.pos.x)<1.5 && Math.abs(localPlayer.pos.z-p.pos.z)<1.5) idx=i;
        }
      });
      if(idx!==-1) {
        if(isHost) handleInteraction(myId, idx);
        else Object.values(connections).forEach(c => c.send({type:'INTERACT', puzzleIdx:idx}));
      }
    }
    
    // ---------- TOUCH ----------
    function setupTouchControls() {
      const j = joystickEl;
      j.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = j.getBoundingClientRect();
        joystickCenter.x = rect.left + rect.width/2;
        joystickCenter.y = rect.top + rect.height/2;
        joystickActive = true;
      });
      j.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        let dx = touch.clientX - joystickCenter.x;
        let dy = touch.clientY - joystickCenter.y;
        const dist = Math.min(50, Math.sqrt(dx*dx+dy*dy));
        const angle = Math.atan2(dy, dx);
        joystickVector.x = Math.cos(angle) * (dist/50);
        joystickVector.y = Math.sin(angle) * (dist/50);
      });
      j.addEventListener('touchend', () => { joystickActive = false; joystickVector.x=0; joystickVector.y=0; });
      
      // Look by dragging on canvas
      renderer.domElement.addEventListener('touchstart', (e) => {
        if(e.touches.length===1) {
          const touch = e.touches[0];
          lastTouchX = touch.clientX;
          lastTouchY = touch.clientY;
        }
      });
      let lastTouchX, lastTouchY;
      renderer.domElement.addEventListener('touchmove', (e) => {
        if(e.touches.length===1) {
          const touch = e.touches[0];
          const dx = touch.clientX - lastTouchX;
          const dy = touch.clientY - lastTouchY;
          rotationY -= dx * 0.01;
          pitch -= dy * 0.008;
          pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
          lastTouchX = touch.clientX;
          lastTouchY = touch.clientY;
          e.preventDefault();
        }
      }, {passive: false});
    }
    
    function onWindowResize() {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    function animate() {
      requestAnimationFrame(animate);
      localMove();
      renderer.render(scene, camera);
    }
    
    function updateUI() {
      levelDisplay.innerText = `🏆 LVL ${game.level+1}`;
      let html = '';
      for(let pid in game.players) {
        const p = game.players[pid];
        html += `<div class="badge" style="padding:6px 12px; background:${p.color}40;">${p.name}</div>`;
      }
      playerTags.innerHTML = html;
    }
    
    // ---------- BUTTON BINDS ----------
    document.getElementById('hostBtn').onclick = () => {
      if(peer) peer.destroy();
      initHost(generateRoomCode());
    };
    document.getElementById('joinBtn').onclick = () => {
      const code = joinInput.value.trim();
      if(!code || code.length!==4) return;
      if(peer) peer.destroy();
      initClient(code);
    };
    document.getElementById('interactBtn').onclick = localInteract;
    document.getElementById('shareBtn').onclick = () => {
      if(isHost) shareItem(myId);
      else Object.values(connections).forEach(c=>c.send({type:'SHARE'}));
    };
    document.getElementById('resetBtn').onclick = () => {
      if(isHost) loadLevel(game.level);
      else Object.values(connections).forEach(c=>c.send({type:'RESET'}));
    };
    document.getElementById('nextBtn').onclick = () => {
      if(!game.win) return;
      if(isHost) loadLevel((game.level+1)%700);
      else Object.values(connections).forEach(c=>c.send({type:'NEXT'}));
    };
    
    // Start everything
    init3D();
    roomDisplay.innerText = `⚫ TAP 'CREATE'`;
  })();
</script>
</body>
</html>
